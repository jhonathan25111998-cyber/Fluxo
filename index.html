<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo - Organize. Execute. Flua.</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* FLUXO: Reset e Base Premium */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Poppins', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    background-attachment: fixed;
    padding: 24px;
    min-height: 100vh;
  }

  .container {
    max-width: 1600px;
    margin: 0 auto;
  }

  /* FLUXO: Glass Header Premium */
  .header {
    background: rgba(26, 27, 38, 0.6);
    backdrop-filter: blur(24px);
    border-radius: 24px;
    padding: 24px 32px;
    margin-bottom: 24px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    position: relative;
  }

  .header-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .logo-img {
    width: 56px;
    height: 56px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .logo-img:hover { transform: scale(1.05); }
  .logo-img img { width: 48px; height: 48px; object-fit: contain; }

  .logo-texto .logo-titulo {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff, #f0f0f0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-texto .logo-subtitulo {
    font-size: 12px;
    opacity: 0.8;
    letter-spacing: 1px;
    color: white;
  }

  .user-info {
    position: absolute;
    top: 24px;
    right: 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.1);
    padding: 8px 16px;
    border-radius: 40px;
    backdrop-filter: blur(10px);
  }
  .user-info span {
    color: white;
    font-size: 14px;
    font-weight: 500;
  }
  .logout-btn {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    padding: 6px 12px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.3s;
  }
  .logout-btn:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: scale(1.05);
  }

  .data-hoje {
    text-align: center;
    margin-top: 16px;
    font-size: 14px;
    opacity: 0.8;
    color: white;
  }

  /* FLUXO: Login Modal */
  .login-overlay {
    display: flex;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(20px);
    z-index: 3000;
    align-items: center;
    justify-content: center;
  }
  .login-container {
    background: rgba(26, 27, 38, 0.95);
    backdrop-filter: blur(24px);
    border-radius: 32px;
    padding: 40px;
    width: 90%;
    max-width: 450px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    animation: fadeInUp 0.4s ease;
  }
  .login-container h2 {
    color: white;
    text-align: center;
    margin-bottom: 30px;
    font-size: 28px;
  }
  .login-container input {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 16px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: white;
    font-size: 14px;
    font-family: 'Poppins', sans-serif;
    outline: none;
    transition: all 0.2s;
  }
  .login-container input:focus {
    border-color: #667eea;
    background: rgba(255, 255, 255, 0.12);
  }
  .login-container input::placeholder {
    color: rgba(255, 255, 255, 0.4);
  }
  .login-buttons {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }
  .login-btn {
    flex: 1;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    padding: 12px;
    border-radius: 40px;
    color: white;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
  }
  .login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
  }
  .register-btn {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
  }
  .error-message {
    color: #FCA5A5;
    font-size: 12px;
    margin-top: -8px;
    margin-bottom: 12px;
    display: block;
  }

  /* FLUXO: Top Bar com Busca e Visualização */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 24px;
  }
  .view-toggle {
    display: flex;
    gap: 12px;
  }
  .view-btn {
    padding: 10px 24px;
    background: rgba(26, 27, 38, 0.6);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 40px;
    color: white;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-size: 14px;
    font-family: 'Poppins', sans-serif;
  }
  .view-btn i { margin-right: 8px; }
  .view-btn.active {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-color: rgba(255, 255, 255, 0.2);
  }
  .view-btn:hover { transform: translateY(-2px); background: rgba(255, 255, 255, 0.15); }

  /* FLUXO: Busca Compacta - Ajustada para 44px altura */
  .busca-global {
    background: rgba(26, 27, 38, 0.6);
    backdrop-filter: blur(24px);
    border-radius: 40px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    width: auto;
    min-width: 260px;
    display: flex;
    align-items: center;
    height: 44px;
  }
  .busca-global i {
    color: rgba(255, 255, 255, 0.6);
    margin-left: 16px;
    font-size: 14px;
  }
  .busca-global input {
    flex: 1;
    padding: 10px 16px 10px 12px;
    background: transparent;
    border: none;
    color: white;
    font-size: 14px;
    font-family: 'Poppins', sans-serif;
    outline: none;
    height: 100%;
  }
  .busca-global input::placeholder {
    color: rgba(255, 255, 255, 0.5);
  }

  /* FLUXO: Dashboard Metas */
  .dashboard-metas h2 {
    color: white;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }

  /* FLUXO: Cards Premium */
  .metas-dashboard-grid, .blocos-tarefas {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
  }

  .meta-card, .bloco-tarefa {
    background: rgba(26, 27, 38, 0.6);
    backdrop-filter: blur(24px);
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    flex: 1;
    min-width: 320px;
    cursor: grab;
    border: 1px solid rgba(255, 255, 255, 0.08);
  }
  .meta-card:hover, .bloco-tarefa:hover {
    transform: translateY(-6px);
    box-shadow: 0 16px 48px rgba(102, 126, 234, 0.15);
    border-color: rgba(102, 126, 234, 0.3);
  }
  .meta-card.dragging, .bloco-tarefa.dragging {
    opacity: 0.5;
    cursor: grabbing;
  }
  .meta-card.drag-over, .bloco-tarefa.drag-over {
    outline: 2px solid #667eea;
    outline-offset: 2px;
  }

  /* FLUXO: Headers dos Cards - Gradiente Uniforme */
  .meta-card-header, .bloco-header {
    padding: 20px 24px;
    font-weight: 700;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 16px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }

  .card-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .card-actions span {
    color: white;
  }
  .card-actions button {
    background: rgba(255, 255, 255, 0.15);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    transition: all 0.2s;
  }
  .card-actions button:hover { background: rgba(255, 255, 255, 0.25); transform: scale(1.05); }

  .meta-progresso {
    background: rgba(255, 255, 255, 0.2);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    color: white;
  }

  .meta-progresso-bar {
    height: 3px;
    background: rgba(255, 255, 255, 0.1);
  }
  .meta-progresso-fill {
    height: 100%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    transition: width 0.3s;
  }

  /* FLUXO: Listas Internas */
  .meta-lista, .tarefa-lista {
    padding: 20px;
    max-height: 350px;
    overflow-y: auto;
  }

  /* FLUXO: Scrollbar customizada */
  .meta-lista::-webkit-scrollbar, .tarefa-lista::-webkit-scrollbar {
    width: 6px;
  }
  .meta-lista::-webkit-scrollbar-track, .tarefa-lista::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
  }
  .meta-lista::-webkit-scrollbar-thumb, .tarefa-lista::-webkit-scrollbar-thumb {
    background: rgba(102, 126, 234, 0.3);
    border-radius: 10px;
  }
  .meta-lista::-webkit-scrollbar-thumb:hover, .tarefa-lista::-webkit-scrollbar-thumb:hover {
    background: rgba(102, 126, 234, 0.5);
  }

  /* FLUXO: Itens */
  .meta-item-dash, .tarefa-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    margin-bottom: 10px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 14px;
    cursor: grab;
    transition: all 0.2s;
    border: 1px solid rgba(255, 255, 255, 0.05);
    color: white;
  }
  .meta-item-dash:hover, .tarefa-item:hover {
    background: rgba(255, 255, 255, 0.08);
    transform: translateX(4px);
    border-color: rgba(102, 126, 234, 0.2);
  }
  .meta-item-dash.atingida, .tarefa-item.concluida {
    opacity: 0.5;
    text-decoration: line-through;
  }
  .meta-item-dash input, .tarefa-item input {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: #667eea;
  }
  .meta-texto-dash, .tarefa-texto {
    flex: 1;
    font-size: 15px;
    line-height: 1.5;
    color: white;
  }
  .meta-data-limite {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 4px;
    color: rgba(255, 255, 255, 0.8);
  }
  .tarefa-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  /* FLUXO: Badges Premium */
  .badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
  }
  .badge.p1 {
    background: rgba(239, 68, 68, 0.2);
    color: #FCA5A5;
    border: 1px solid rgba(239, 68, 68, 0.3);
  }
  .badge.recorrente {
    background: rgba(102, 126, 234, 0.2);
    color: #A5B4FC;
    border: 1px solid rgba(102, 126, 234, 0.3);
  }
  .badge.atrasada {
    background: rgba(239, 68, 68, 0.2);
    color: #FCA5A5;
    border: 1px solid rgba(239, 68, 68, 0.3);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .item-actions {
    display: flex;
    gap: 6px;
  }
  .item-actions button {
    background: transparent;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 10px;
    cursor: pointer;
    color: rgba(255, 255, 255, 0.6);
    transition: all 0.2s;
  }
  .item-actions button:hover { background: rgba(255, 255, 255, 0.1); color: white; transform: scale(1.05); }

  /* FLUXO: Add Meta Section */
  .meta-add-dash {
    padding: 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .meta-add-dash input {
    flex: 1;
    min-width: 150px;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    font-size: 14px;
    font-family: 'Poppins', sans-serif;
    color: white;
    outline: none;
    transition: all 0.2s;
  }
  .meta-add-dash input:focus {
    border-color: #667eea;
    background: rgba(255, 255, 255, 0.12);
  }
  .meta-add-dash input::placeholder {
    color: rgba(255, 255, 255, 0.4);
  }

  /* FLUXO: Card Adicionar - Texto Branco Garantido */
  .card-adicionar {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(24px);
    border: 2px dashed rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    min-width: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-adicionar:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: scale(1.02);
    border-color: rgba(255, 255, 255, 0.4);
  }
  .card-adicionar-conteudo {
    text-align: center;
    padding: 40px 20px;
    color: white;
  }
  .card-adicionar-conteudo i {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.9;
    color: white;
  }
  .card-adicionar-conteudo p {
    color: white;
    font-weight: 500;
    font-size: 14px;
  }

  /* FLUXO: Botão Glass Premium */
  .btn-glass {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    padding: 10px 20px;
    border-radius: 40px;
    color: white;
    cursor: pointer;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
    height: 44px;
    font-size: 14px;
  }
  .btn-glass:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
  }

  /* FLUXO: Formulários */
  .adicionar {
    background: rgba(26, 27, 38, 0.6);
    backdrop-filter: blur(24px);
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 24px;
    border: 1px solid rgba(255, 255, 255, 0.08);
  }
  .adicionar h3 {
    color: white;
    margin-bottom: 20px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 12px;
  }
  .adicionar input, .adicionar select {
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    font-size: 14px;
    font-family: 'Poppins', sans-serif;
    color: white;
    outline: none;
    transition: all 0.2s;
    height: 44px;
  }
  .adicionar input:focus, .adicionar select:focus {
    border-color: #667eea;
    background: rgba(255, 255, 255, 0.12);
  }
  .adicionar option {
    background: #1a1b26;
    color: white;
  }
  .adicionar input::placeholder {
    color: rgba(255, 255, 255, 0.4);
  }

  /* FLUXO: Filtros */
  .filtros {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .filtro-btn {
    padding: 8px 20px;
    background: rgba(26, 27, 38, 0.6);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 40px;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    height: 40px;
  }
  .filtro-btn i { margin-right: 6px; }
  .filtro-btn.active {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-color: rgba(255, 255, 255, 0.2);
  }
  .filtro-btn:hover { transform: translateY(-2px); background: rgba(255, 255, 255, 0.15); }

  /* FLUXO: Estatísticas Premium */
  .estatisticas {
    background: rgba(26, 27, 38, 0.6);
    backdrop-filter: blur(24px);
    border-radius: 24px;
    padding: 24px;
    margin-top: 24px;
    border: 1px solid rgba(255, 255, 255, 0.08);
  }
  .estatisticas h3 {
    color: white;
    margin-bottom: 16px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }
  .stat-card {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    transition: all 0.3s;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }
  .stat-card:hover { transform: translateY(-4px); background: rgba(255, 255, 255, 0.08); }
  .stat-card i { font-size: 32px; margin-bottom: 12px; color: #667eea; }
  .stat-numero {
    font-size: 36px;
    font-weight: 800;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.8;
    margin-top: 6px;
    color: rgba(255, 255, 255, 0.8);
  }

  .grafico-barras {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    height: 160px;
    margin-top: 24px;
    padding: 16px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 16px;
  }
  .barra {
    flex: 1;
    background: linear-gradient(180deg, #667eea, #764ba2);
    border-radius: 12px 12px 0 0;
    position: relative;
    transition: height 0.3s;
    min-width: 40px;
  }
  .barra-valor {
    position: absolute;
    top: -24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    font-weight: 600;
    color: white;
  }
  .barra-label {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    white-space: nowrap;
    color: rgba(255, 255, 255, 0.7);
  }

  .backup-acoes {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 32px;
  }

  /* FLUXO: Estados Vazios */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    opacity: 0.6;
    color: white;
  }
  .empty-state i {
    font-size: 48px;
    margin-bottom: 12px;
  }
  .empty-state p {
    font-weight: 600;
    margin-bottom: 4px;
  }
  .empty-state small {
    font-size: 13px;
    opacity: 0.8;
  }

  /* FLUXO: Modal Foco */
  .modal-foco-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    z-index: 2000;
    align-items: center;
    justify-content: center;
  }
  .modal-foco-overlay.show { display: flex; }
  .modal-foco-conteudo {
    background: rgba(26, 27, 38, 0.95);
    backdrop-filter: blur(24px);
    padding: 40px;
    border-radius: 32px;
    max-width: 600px;
    width: 90%;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.1);
    animation: fadeInUp 0.4s ease;
  }
  .modal-foco-conteudo h2 {
    color: white;
    margin: 20px 0;
  }
  .progresso-foco {
    height: 6px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
    margin: 20px 0;
    overflow: hidden;
  }
  .progresso-foco-bar {
    height: 100%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    width: 0%;
    transition: width 0.3s;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* FLUXO: Calendário */
  .calendario-grade {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  .calendario-dia-semana {
    text-align: center;
    padding: 8px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    color: white;
  }
  .calendario-dia {

<script>
// ========== SISTEMA DE AUTENTICAÇÃO ==========
let usuarios = [];
let usuarioAtual = null;
let tarefas = [];
let metas = [];
let cardsMetas = [];
let cardsTarefas = [];

// Variáveis de estado
let filtroAtual = 'hoje';
let termoBusca = '';
let tarefaArrastando = null;
let metaArrastando = null;
let cardMetaArrastando = null;
let cardTarefaArrastando = null;
let pomodoroAtivo = false;
let pomodoroPausado = false;
let tempoRestante = 25 * 60;
let pomodoroInterval = null;
let tarefaFocoAtual = null;
let viewAtual = 'cards';
let dataAtualCalendario = new Date();

// ========== FUNÇÕES AUXILIARES ==========
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function atualizarDataHoje() {
  const hoje = new Date();
  const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  const dataEl = document.getElementById('dataHoje');
  if (dataEl) dataEl.textContent = hoje.toLocaleDateString('pt-BR', opcoes);
}

function carregarTema() {
  const saved = localStorage.getItem('tema');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
}

function toggleTema() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  if (isDark) {
    html.removeAttribute('data-theme');
    localStorage.setItem('tema', 'light');
  } else {
    html.setAttribute('data-theme', 'dark');
    localStorage.setItem('tema', 'dark');
  }
}

// ========== FUNÇÕES DE SALVAMENTO ==========
function salvarDadosUsuario() {
  if (!usuarioAtual) return;
  const dados = { tarefas, metas, cardsMetas, cardsTarefas };
  localStorage.setItem(`fluxo_dados_${usuarioAtual.id}`, JSON.stringify(dados));
}

function salvarTarefas() {
  localStorage.setItem('tarefas', JSON.stringify(tarefas));
  salvarDadosUsuario();
  renderizarTarefas();
  renderizarEstatisticas();
}

function salvarMetas() {
  localStorage.setItem('metas', JSON.stringify(metas));
  salvarDadosUsuario();
  renderizarDashboardMetas();
  renderizarEstatisticas();
}

function salvarCardsMetas() {
  salvarDadosUsuario();
  renderizarDashboardMetas();
}

function salvarCardsTarefas() {
  salvarDadosUsuario();
  atualizarSelectCategorias();
  renderizarTarefas();
}

// ========== AUTENTICAÇÃO ==========
function carregarUsuarios() {
  const saved = localStorage.getItem('fluxo_usuarios');
  if (saved) {
    usuarios = JSON.parse(saved);
  } else {
    usuarios = [{ id: '1', username: 'demo', password: 'demo123' }];
    localStorage.setItem('fluxo_usuarios', JSON.stringify(usuarios));
  }
}

function fazerLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errorDiv = document.getElementById('loginError');
  
  if (!username || !password) {
    errorDiv.textContent = 'Preencha todos os campos!';
    return;
  }
  
  const usuario = usuarios.find(u => u.username === username && u.password === password);
  
  if (!usuario) {
    errorDiv.textContent = 'Usuário ou senha inválidos!';
    return;
  }
  
  usuarioAtual = usuario;
  localStorage.setItem('fluxo_usuario_atual', JSON.stringify({ id: usuario.id, username: usuario.username }));
  
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('currentUser').textContent = usuario.username;
  
  carregarDadosUsuario();
}

function fazerRegistro() {
  const username = document.getElementById('registerUsername').value.trim();
  const password = document.getElementById('registerPassword').value;
  const confirm = document.getElementById('registerConfirm').value;
  const errorDiv = document.getElementById('registerError');
  
  if (!username || !password) {
    errorDiv.textContent = 'Preencha todos os campos!';
    return;
  }
  
  if (password !== confirm) {
    errorDiv.textContent = 'As senhas não coincidem!';
    return;
  }
  
  if (password.length < 4) {
    errorDiv.textContent = 'A senha deve ter no mínimo 4 caracteres!';
    return;
  }
  
  if (usuarios.some(u => u.username === username)) {
    errorDiv.textContent = 'Usuário já existe!';
    return;
  }
  
  const novoUsuario = { id: Date.now().toString(), username, password };
  usuarios.push(novoUsuario);
  localStorage.setItem('fluxo_usuarios', JSON.stringify(usuarios));
  
  const dadosIniciais = {
    tarefas: [],
    metas: [],
    cardsMetas: [
      { id: "meta_pessoal", nome: "Pessoal" },
      { id: "meta_jw", nome: "JW" },
      { id: "meta_at", nome: "At Inovvate" },
      { id: "meta_waw", nome: "WAW" }
    ],
    cardsTarefas: [
      { id: "tarefa_pessoal", nome: "Pessoal" },
      { id: "tarefa_jw", nome: "JW" },
      { id: "tarefa_at", nome: "At Inovvate" },
      { id: "tarefa_waw", nome: "WAW" }
    ]
  };
  localStorage.setItem(`fluxo_dados_${novoUsuario.id}`, JSON.stringify(dadosIniciais));
  
  alert('Conta criada com sucesso! Faça login.');
  mostrarLogin();
}

function mostrarRegistro() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('registerForm').style.display = 'block';
}

function mostrarLogin() {
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('registerForm').style.display = 'none';
}

function fazerLogout() {
  usuarioAtual = null;
  localStorage.removeItem('fluxo_usuario_atual');
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}

function verificarSessao() {
  const savedUser = localStorage.getItem('fluxo_usuario_atual');
  if (savedUser) {
    const user = JSON.parse(savedUser);
    const usuarioExistente = usuarios.find(u => u.id === user.id);
    if (usuarioExistente) {
      usuarioAtual = usuarioExistente;
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      document.getElementById('currentUser').textContent = usuarioExistente.username;
      carregarDadosUsuario();
      return true;
    }
  }
  return false;
}

function carregarDadosUsuario() {
  if (!usuarioAtual) return;
  
  const dadosKey = `fluxo_dados_${usuarioAtual.id}`;
  const saved = localStorage.getItem(dadosKey);
  
  if (saved) {
    const dados = JSON.parse(saved);
    tarefas = dados.tarefas || [];
    metas = dados.metas || [];
    cardsMetas = dados.cardsMetas || [
      { id: "meta_pessoal", nome: "Pessoal" },
      { id: "meta_jw", nome: "JW" },
      { id: "meta_at", nome: "At Inovvate" },
      { id: "meta_waw", nome: "WAW" }
    ];
    cardsTarefas = dados.cardsTarefas || [
      { id: "tarefa_pessoal", nome: "Pessoal" },
      { id: "tarefa_jw", nome: "JW" },
      { id: "tarefa_at", nome: "At Inovvate" },
      { id: "tarefa_waw", nome: "WAW" }
    ];
  } else {
    tarefas = [];
    metas = [];
    cardsMetas = [
      { id: "meta_pessoal", nome: "Pessoal" },
      { id: "meta_jw", nome: "JW" },
      { id: "meta_at", nome: "At Inovvate" },
      { id: "meta_waw", nome: "WAW" }
    ];
    cardsTarefas = [
      { id: "tarefa_pessoal", nome: "Pessoal" },
      { id: "tarefa_jw", nome: "JW" },
      { id: "tarefa_at", nome: "At Inovvate" },
      { id: "tarefa_waw", nome: "WAW" }
    ];
  }
  
  atualizarSelectCategorias();
  carregarTema();
  atualizarDataHoje();
  renderizarDashboardMetas();
  renderizarTarefas();
  renderizarEstatisticas();
}

// ========== FUNÇÕES DE UI ==========
function atualizarSelectCategorias() {
  const select = document.getElementById('nova-bloco');
  if (!select) return;
  select.innerHTML = '';
  cardsTarefas.forEach(card => {
    const option = document.createElement('option');
    option.value = card.nome;
    option.textContent = card.nome;
    select.appendChild(option);
  });
}

function adicionarCardMeta() {
  const nome = prompt('🏆 Nome do novo card:', 'Nova Categoria');
  if (!nome || nome.trim() === '') return;
  cardsMetas.push({ id: 'meta_' + Date.now(), nome: nome.trim() });
  salvarCardsMetas();
}

function adicionarCardTarefa() {
  const nome = prompt('📋 Nome do novo card:', 'Nova Lista');
  if (!nome || nome.trim() === '') return;
  cardsTarefas.push({ id: 'tarefa_' + Date.now(), nome: nome.trim() });
  salvarCardsTarefas();
}

function editarCardMeta(id) {
  const card = cardsMetas.find(c => c.id === id);
  if (!card) return;
  const novoNome = prompt('Editar nome:', card.nome);
  if (novoNome && novoNome.trim()) {
    metas.forEach(m => { if (m.categoria === card.nome) m.categoria = novoNome.trim(); });
    card.nome = novoNome.trim();
  }
  salvarCardsMetas();
  salvarMetas();
}

function editarCardTarefa(id) {
  const card = cardsTarefas.find(c => c.id === id);
  if (!card) return;
  const novoNome = prompt('Editar nome:', card.nome);
  if (novoNome && novoNome.trim()) {
    tarefas.forEach(t => { if (t.bloco === card.nome) t.bloco = novoNome.trim(); });
    card.nome = novoNome.trim();
  }
  salvarCardsTarefas();
  salvarTarefas();
}

function excluirCardMeta(id) {
  const card = cardsMetas.find(c => c.id === id);
  if (!card) return;
  if (confirm(`Excluir "${card.nome}"?`)) {
    const alvo = cardsMetas.find(c => c.nome === 'Pessoal') || cardsMetas[0];
    metas.forEach(m => { if (m.categoria === card.nome) m.categoria = alvo.nome; });
    cardsMetas = cardsMetas.filter(c => c.id !== id);
    salvarCardsMetas();
    salvarMetas();
  }
}

function excluirCardTarefa(id) {
  const card = cardsTarefas.find(c => c.id === id);
  if (!card) return;
  if (confirm(`Excluir "${card.nome}"?`)) {
    const alvo = cardsTarefas.find(c => c.nome === 'Pessoal') || cardsTarefas[0];
    tarefas.forEach(t => { if (t.bloco === card.nome) t.bloco = alvo.nome; });
    cardsTarefas = cardsTarefas.filter(c => c.id !== id);
    salvarCardsTarefas();
    salvarTarefas();
  }
}

function moverCardMeta(origemId, destinoId) {
  const idxOrigem = cardsMetas.findIndex(c => c.id === origemId);
  const idxDestino = cardsMetas.findIndex(c => c.id === destinoId);
  if (idxOrigem === -1 || idxDestino === -1) return;
  const [movido] = cardsMetas.splice(idxOrigem, 1);
  cardsMetas.splice(idxDestino, 0, movido);
  salvarCardsMetas();
}

function moverCardTarefa(origemId, destinoId) {
  const idxOrigem = cardsTarefas.findIndex(c => c.id === origemId);
  const idxDestino = cardsTarefas.findIndex(c => c.id === destinoId);
  if (idxOrigem === -1 || idxDestino === -1) return;
  const [movido] = cardsTarefas.splice(idxOrigem, 1);
  cardsTarefas.splice(idxDestino, 0, movido);
  salvarCardsTarefas();
}

function adicionarMeta(categoria, cardId) {
  const input = document.getElementById(`input-meta-${cardId}`);
  const texto = input?.value.trim();
  if (!texto) return;
  const dataInput = document.getElementById(`input-data-meta-${cardId}`);
  metas.push({
    id: Date.now(),
    texto: texto,
    categoria: categoria,
    atingida: false,
    dataLimite: dataInput?.value || ''
  });
  if (input) input.value = '';
  if (dataInput) dataInput.value = '';
  salvarMetas();
}

function adicionarTarefa() {
  const texto = document.getElementById('nova-tarefa').value.trim();
  if (!texto) { alert('Digite uma tarefa!'); return; }
  const data = document.getElementById('nova-data').value || new Date().toISOString().split('T')[0];
  const bloco = document.getElementById('nova-bloco').value;
  tarefas.push({
    id: Date.now(),
    texto: texto,
    bloco: bloco,
    data: data,
    hora: document.getElementById('nova-hora').value,
    prioridade: document.getElementById('nova-prioridade').value,
    recorrencia: document.getElementById('nova-recorrencia').value,
    concluida: false,
    criada: new Date().toISOString(),
    alertado: false,
    ordem: tarefas.filter(t => t.bloco === bloco).length,
    tempoGasto: 0
  });

  document.getElementById('nova-hora').value = '';

}

function toggleMeta(id) {
  const meta = metas.find(m => m.id === id);
  if (meta) { meta.atingida = !meta.atingida; salvarMetas(); }
}

function toggleTarefa(id) {
  const t = tarefas.find(t => t.id === id);
  if (t) { t.concluida = !t.concluida; salvarTarefas(); }
}

function excluirMeta(id) {
  if (confirm('Excluir esta meta?')) {
    metas = metas.filter(m => m.id !== id);
    salvarMetas();
  }
}

function excluirTarefa(id) {
  if (confirm('Excluir esta tarefa?')) {
    tarefas = tarefas.filter(t => t.id !== id);
    salvarTarefas();
  }
}

function editarMetaPrompt(id) {
  const meta = metas.find(m => m.id === id);
  if (!meta) return;
  const novoTexto = prompt('Editar meta:', meta.texto);
  if (novoTexto && novoTexto.trim()) meta.texto = novoTexto.trim();
  const novaData = prompt('Data limite:', meta.dataLimite || '');
  if (novaData !== null) meta.dataLimite = novaData;
  salvarMetas();
}

function editarTarefa(id) {
  const t = tarefas.find(t => t.id === id);
  if (!t) return;
  const novoTexto = prompt('Editar tarefa:', t.texto);
  if (novoTexto && novoTexto.trim()) t.texto = novoTexto.trim();
  const novaData = prompt('Data:', t.data || '');
  if (novaData && novaData.match(/^\d{4}-\d{2}-\d{2}$/)) t.data = novaData;
  const novaPrioridade = prompt('Prioridade (p1/p2/p3):', t.prioridade);
  if (novaPrioridade && ['p1','p2','p3'].includes(novaPrioridade)) t.prioridade = novaPrioridade;
  salvarTarefas();
}

function setFiltro(filtro, btn) {
  filtroAtual = filtro;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderizarTarefas();
}

function buscarGlobal() {
  termoBusca = document.getElementById('buscaGlobal').value.toLowerCase();
  renderizarTarefas();
}

function filtrarTarefas(lista) {
  const hoje = new Date().toISOString().split('T')[0];
  let filtradas = lista;
  if (termoBusca) filtradas = filtradas.filter(t => t.texto.toLowerCase().includes(termoBusca));
  if (filtroAtual === 'hoje') return filtradas.filter(t => t.data <= hoje && !t.concluida);
  if (filtroAtual === 'concluidas') return filtradas.filter(t => t.concluida);
  return filtradas.filter(t => !t.concluida);
}

function toggleView(view) {
  viewAtual = view;
  const cards = document.getElementById('cardsView');
  const cal = document.getElementById('calendarioView');
  const btns = document.querySelectorAll('.view-btn');
  btns.forEach(btn => btn.classList.remove('active'));
  if (view === 'cards') {
    cards.style.display = 'block';
    cal.style.display = 'none';
    btns[0].classList.add('active');

  } else {
    cards.style.display = 'none';

    btns[1].classList.add('active');

function mudarMes(delta) {
  dataAtualCalendario.setMonth(dataAtualCalendario.getMonth() + delta);
  renderizarCalendario();
}

function renderizarCalendario() {
  const ano = dataAtualCalendario.getFullYear();
  const mes = dataAtualCalendario.getMonth();
  const primeiroDia = new Date(ano, mes, 1);
  const ultimoDia = new Date(ano, mes + 1, 0);
  const diasNoMes = ultimoDia.getDate();
  const diaInicio = primeiroDia.getDay();
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('calendarioMes').textContent = `${meses[mes]} ${ano}`;
  const diasSemana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  let html = '';
  diasSemana.forEach(d => { html += `<div class="calendario-dia-semana">${d}</div>`; });
  let dia = 1;
  const hoje = new Date().toISOString().split('T')[0];
  for (let i = 0; i < 42; i++) {
    if (i < diaInicio || dia > diasNoMes) {
      html += `<div class="calendario-dia vazio"></div>`;
    } else {
      const dataStr = `${ano}-${String(mes+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
      const tarefasDia = tarefas.filter(t => t.data === dataStr && !t.concluida);
      const isHoje = dataStr === hoje;
      html += `<div class="calendario-dia ${isHoje ? 'hoje' : ''}" onclick="selecionarDataCalendario('${dataStr}')">
        <div style="font-weight: bold; margin-bottom: 5px;">${dia}</div>
        <div style="font-size: 11px; max-height: 70px; overflow-y: auto;">`;
      tarefasDia.slice(0, 4).forEach(t => {
        html += `<div style="padding: 2px 4px; background: rgba(102,126,234,0.2); border-radius: 6px; margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" onclick="event.stopPropagation(); abrirModoFocoComTarefa(${t.id})">${escapeHtml(t.texto.substring(0, 20))}${t.texto.length > 20 ? '...' : ''}</div>`;
      });
      if (tarefasDia.length > 4) html += `<div style="font-size: 10px; opacity: 0.7;">+${tarefasDia.length-4} mais</div>`;
      html += `</div></div>`;
      dia++;
    }
  }
  document.getElementById('calendarioGrade').innerHTML = html;
}

function selecionarDataCalendario(data) {
  const tarefasDia = tarefas.filter(t => t.data === data && !t.concluida);
  if (tarefasDia.length) {
    alert(`📅 ${data}\n\n${tarefasDia.map((t,i)=>`${i+1}. ${t.texto}`).join('\n')}`);
  } else {
    alert(`📅 ${data}\nNenhuma tarefa pendente.`);
  }
}

function abrirModoFocoComTarefa(id) {
  const t = tarefas.find(t => t.id === id);
  if (!t) return;
  tarefaFocoAtual = t;
  document.getElementById('tarefaFocoTexto').textContent = t.texto;
  tempoRestante = 25 * 60;
  atualizarTimerDisplay();
  document.getElementById('modalFocoOverlay').classList.add('show');
  if (pomodoroInterval) clearInterval(pomodoroInterval);
  pomodoroAtivo = false;
  document.getElementById('btnIniciarFoco').style.display = 'inline-block';
  document.getElementById('btnPausarFoco').style.display = 'none';
}

function abrirModoFoco() {
  const pendentes = tarefas.filter(t => !t.concluida);
  if (!pendentes.length) { alert('🎉 Nenhuma tarefa pendente!'); return; }
  abrirModoFocoComTarefa(pendentes[0].id);
}

function atualizarTimerDisplay() {
  const min = Math.floor(tempoRestante / 60);
  const seg = tempoRestante % 60;
  document.getElementById('timerFocoGrande').textContent = `${min.toString().padStart(2,'0')}:${seg.toString().padStart(2,'0')}`;
  const progresso = ((25*60 - tempoRestante) / (25*60)) * 100;
  const bar = document.querySelector('#modalFocoOverlay .progresso-foco-bar');
  if (bar) bar.style.width = `${progresso}%`;
}

function iniciarPomodoroFoco() {
  if (pomodoroAtivo) return;
  pomodoroAtivo = true;
  pomodoroPausado = false;
  if (pomodoroInterval) clearInterval(pomodoroInterval);
  pomodoroInterval = setInterval(() => {
    if (!pomodoroPausado && pomodoroAtivo && tempoRestante > 0) {
      tempoRestante--;
      atualizarTimerDisplay();
      if (tempoRestante <= 0) {
        clearInterval(pomodoroInterval);
        pomodoroAtivo = false;
        if (tarefaFocoAtual) {
          tarefaFocoAtual.tempoGasto = (tarefaFocoAtual.tempoGasto || 0) + (25 * 60);
          salvarTarefas();
        }
        alert('🎉 Pomodoro concluído!');
        tempoRestante = 25 * 60;
        atualizarTimerDisplay();
        document.getElementById('btnIniciarFoco').style.display = 'inline-block';
        document.getElementById('btnPausarFoco').style.display = 'none';
      }
    }
  }, 1000);
  document.getElementById('btnIniciarFoco').style.display = 'none';
  document.getElementById('btnPausarFoco').style.display = 'inline-block';
}

function pausarPomodoroFoco() {
  if (!pomodoroAtivo) return;
  pomodoroPausado = !pomodoroPausado;
  document.getElementById('btnPausarFoco').innerHTML = pomodoroPausado ? '<i class="fas fa-play"></i> Retomar' : '<i class="fas fa-pause"></i> Pausar';
}

function resetarPomodoroFoco() {
  if (pomodoroInterval) clearInterval(pomodoroInterval);
  tempoRestante = 25 * 60;
  atualizarTimerDisplay();
  pomodoroAtivo = false;
  document.getElementById('btnIniciarFoco').style.display = 'inline-block';
  document.getElementById('btnPausarFoco').style.display = 'none';
}

function concluirTarefaFoco() {
  if (!tarefaFocoAtual) return;
  if (confirm(`Concluir "${tarefaFocoAtual.texto}"?`)) {
    toggleTarefa(tarefaFocoAtual.id);
    fecharModoFoco();
    setTimeout(() => {
      const pendentes = tarefas.filter(t => !t.concluida);
      if (pendentes.length) abrirModoFocoComTarefa(pendentes[0].id);
    }, 300);
  }
}

function fecharModoFoco() {
  if (pomodoroInterval) clearInterval(pomodoroInterval);
  pomodoroAtivo = false;
  document.getElementById('modalFocoOverlay').classList.remove('show');
}

function renderizarEstatisticas() {
  const totalTarefas = tarefas.length;
  const concluidas = tarefas.filter(t => t.concluida).length;
  const metasAt = metas.filter(m => m.atingida).length;
  const tempo = tarefas.reduce((acc, t) => acc + (t.tempoGasto || 0), 0);
  const horas = Math.floor(tempo / 3600);
  const minutos = Math.floor((tempo % 3600) / 60);
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><i class="fas fa-check-circle"></i><div class="stat-numero">${concluidas}</div><div class="stat-label">Tarefas Concluídas</div></div>
    <div class="stat-card"><i class="fas fa-chart-simple"></i><div class="stat-numero">${totalTarefas ? Math.round(concluidas/totalTarefas*100) : 0}%</div><div class="stat-label">Taxa de Conclusão</div></div>
    <div class="stat-card"><i class="fas fa-trophy"></i><div class="stat-numero">${metasAt}/${metas.length}</div><div class="stat-label">Metas Atingidas</div></div>
    <div class="stat-card"><i class="fas fa-hourglass-half"></i><div class="stat-numero">${horas}h ${minutos}m</div><div class="stat-label">Tempo Focado</div></div>
  `;
  const grafico = document.getElementById('graficoBarras');
  if (grafico) {
    grafico.innerHTML = '';
    const max = Math.max(...cardsTarefas.map(c => tarefas.filter(t => t.bloco === c.nome && t.concluida).length), 1);
    cardsTarefas.forEach(card => {
      const concluidasCard = tarefas.filter(t => t.bloco === card.nome && t.concluida).length;
      const altura = Math.max((concluidasCard / max) * 100, 5);
      const barra = document.createElement('div');
      barra.className = 'barra';
      barra.style.height = altura + '%';
      barra.innerHTML = `<div class="barra-valor">${concluidasCard}</div><div class="barra-label">${card.nome.substring(0,3)}</div>`;
      grafico.appendChild(barra);
    });
  }
}

function exportarBackup() {
  const dados = { tarefas, metas, cardsMetas, cardsTarefas };
  const blob = new Blob([JSON.stringify(dados)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `fluxo-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  alert('✅ Backup exportado!');
}

function importarBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const dados = JSON.parse(ev.target.result);
      
      const totalTarefas = dados.tarefas ? dados.tarefas.length : 0;
      const totalMetas = dados.metas ? dados.metas.length : 0;
      
      if (confirm(`📦 Importar backup?\n\nTarefas: ${totalTarefas}\nMetas: ${totalMetas}\n\nIsso substituirá seus dados atuais.`)) {
        
        if (dados.tarefas) tarefas = dados.tarefas;
        if (dados.metas) metas = dados.metas;
        if (dados.cardsMetas) cardsMetas = dados.cardsMetas;
        if (dados.cardsTarefas) cardsTarefas = dados.cardsTarefas;
        
        salvarCardsMetas();
        salvarCardsTarefas();
        salvarTarefas();
        salvarMetas();
        
        alert('✅ Backup importado com sucesso!');
        
        atualizarSelectCategorias();
        renderizarDashboardMetas();
        renderizarTarefas();
        renderizarEstatisticas();
      }
    } catch (err) {
      console.error('Erro:', err);
      alert('❌ Erro ao importar arquivo. Verifique se é um JSON válido.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// Inicialização
carregarUsuarios();
if (!verificarSessao()) {
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}
</script>
