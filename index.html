<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLUXO - Organize. Execute. Flua.</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    background-attachment: fixed;
    padding: 24px;
    min-height: 100vh;
  }
  .container { max-width: 1600px; margin: 0 auto; }
  .header {
    background: rgba(26, 27, 38, 0.6);
    backdrop-filter: blur(24px);
    border-radius: 24px;
    padding: 24px 32px;
    margin-bottom: 24px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    position: relative;
  }
  .header-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .logo-img {
    width: 56px;
    height: 56px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s;
  }
  .logo-img:hover { transform: scale(1.05); }
  .logo-img img { width: 48px; height: 48px; object-fit: contain; }
  .logo-texto .logo-titulo {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff, #f0f0f0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-texto .logo-subtitulo {
    font-size: 12px;
    opacity: 0.8;
    letter-spacing: 1px;
    color: white;
  }
  .user-info {
    position: absolute;
    top: 24px;
    right: 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.1);
    padding: 8px 16px;
    border-radius: 40px;
    backdrop-filter: blur(10px);
  }
  .user-info span { color: white; font-size: 14px; font-weight: 500; }
  .logout-btn, .sync-btn {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    padding: 6px 12px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.3s;
  }
  .logout-btn:hover, .sync-btn:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.05); }
  .sync-btn.syncing { animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .data-hoje { text-align: center; margin-top: 16px; font-size: 14px; opacity: 0.8; color: white; }
  .login-overlay {
    display: flex;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(20px);
    z-index: 3000;
    align-items: center;
    justify-content: center;
  }
  .login-container {
    background: rgba(26, 27, 38, 0.95);
    backdrop-filter: blur(24px);
    border-radius: 32px;
    padding: 40px;
    width: 90%;
    max-width: 450px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
  }
  .login-container h2 { color: white; margin-bottom: 30px; font-size: 28px; }
  .login-container input {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 16px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: white;
    font-size: 14px;
    outline: none;
  }
  .login-container input:focus { border-color: #667eea; background: rgba(255, 255, 255, 0.12); }
  .login-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    padding: 12px;
    border-radius: 40px;
    color: white;
    cursor: pointer;
    font-weight: 600;
    width: 100%;
    margin-top: 10px;
  }
  .login-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(102,126,234,0.4); }
  .register-link { color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 20px; display: block; cursor: pointer; }
  .register-link:hover { color: white; }
  .error-message { color: #FCA5A5; font-size: 12px; margin-bottom: 12px; display: block; }
  
  .password-container {
    position: relative;
    width: 100%;
    margin-bottom: 16px;
  }
  .password-container input {
    width: 100%;
    padding: 14px 45px 14px 16px;
    margin-bottom: 0;
  }
  .toggle-password {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    font-size: 18px;
    transition: color 0.3s;
  }
  .toggle-password:hover {
    color: white;
  }
  
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 24px;
  }
  .view-toggle { display: flex; gap: 12px; }
  .view-btn {
    padding: 10px 24px;
    background: rgba(26, 27, 38, 0.6);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 40px;
    color: white;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
    font-size: 14px;
  }
  .view-btn i { margin-right: 8px; }
  .view-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: rgba(255,255,255,0.2); }
  .view-btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.15); }
  .busca-global {
    background: rgba(26, 27, 38, 0.6);
    backdrop-filter: blur(24px);
    border-radius: 40px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    width: auto;
    min-width: 260px;
    display: flex;
    align-items: center;
    height: 44px;
  }
  .busca-global i { color: rgba(255,255,255,0.6); margin-left: 16px; font-size: 14px; }
  .busca-global input {
    flex: 1;
    padding: 10px 16px 10px 12px;
    background: transparent;
    border: none;
    color: white;
    font-size: 14px;
    outline: none;
    height: 100%;
  }
  .dashboard-metas h2 {
    color: white;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  .metas-dashboard-grid, .blocos-tarefas {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
  }
  .meta-card, .bloco-tarefa {
    background: rgba(26, 27, 38, 0.6);
    backdrop-filter: blur(24px);
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.3s;
    flex: 1;
    min-width: 320px;
    cursor: grab;
    border: 1px solid rgba(255, 255, 255, 0.08);
  }
  .meta-card:hover, .bloco-tarefa:hover {
    transform: translateY(-6px);
    box-shadow: 0 16px 48px rgba(102,126,234,0.15);
    border-color: rgba(102,126,234,0.3);
  }
  .meta-card-header, .bloco-header {
    padding: 20px 24px;
    font-weight: 700;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 16px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }
  .card-actions { display: flex; gap: 8px; align-items: center; }
  .card-actions button {
    background: rgba(255,255,255,0.15);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    transition: all 0.2s;
  }
  .card-actions button:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
  .meta-progresso {
    background: rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    color: white;
  }
  .meta-progresso-bar { height: 3px; background: rgba(255,255,255,0.1); }
  .meta-progresso-fill { height: 100%; background: linear-gradient(135deg, #667eea, #764ba2); transition: width 0.3s; }
  .meta-lista, .tarefa-lista { padding: 20px; max-height: 350px; overflow-y: auto; }
  .meta-item-dash {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px;
    margin-bottom: 10px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 14px;
    cursor: grab;
    transition: all 0.2s;
    border: 1px solid rgba(255, 255, 255, 0.05);
    color: white;
  }
  .meta-item-dash:hover { background: rgba(255,255,255,0.08); transform: translateX(4px); }
  .meta-item-dash.atingida { opacity: 0.5; text-decoration: line-through; }
  .meta-item-dash input { width: 18px; height: 18px; margin-top: 2px; cursor: pointer; accent-color: #667eea; flex-shrink: 0; }
  .meta-texto-dash { flex: 1; font-size: 14px; line-height: 1.4; color: white; word-break: break-word; }
  .meta-data-limite { font-size: 11px; opacity: 0.7; margin-top: 4px; color: rgba(255,255,255,0.7); display: inline-flex; align-items: center; gap: 4px; }
  .tarefa-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px;
    margin-bottom: 10px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 14px;
    cursor: grab;
    transition: all 0.2s;
    border: 1px solid rgba(255, 255, 255, 0.05);
    color: white;
  }
  .tarefa-item:hover { background: rgba(255,255,255,0.08); transform: translateX(4px); }
  .tarefa-item.concluida { opacity: 0.5; text-decoration: line-through; }
  .tarefa-item input { width: 18px; height: 18px; margin-top: 2px; cursor: pointer; accent-color: #667eea; flex-shrink: 0; }
  .tarefa-conteudo { flex: 1; min-width: 0; }
  .tarefa-texto { font-size: 14px; line-height: 1.4; color: white; word-break: break-word; margin-bottom: 6px; }
  .tarefa-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 4px; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
    background: rgba(255, 255, 255, 0.1);
    color: white;
  }
  .badge i { font-size: 9px; }
  .badge.p1 { background: rgba(239,68,68,0.2); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.3); }
  .badge.recorrente { background: rgba(102,126,234,0.2); color: #A5B4FC; border: 1px solid rgba(102,126,234,0.3); }
  .badge.atrasada { background: rgba(239,68,68,0.2); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.3); animation: pulse 2s infinite; }
  .item-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .item-actions button {
    background: transparent;
    border: none;
    width: 30px;
    height: 30px;
    border-radius: 8px;
    cursor: pointer;
    color: rgba(255,255,255,0.6);
    transition: all 0.2s;
  }
  .item-actions button:hover { background: rgba(255,255,255,0.1); color: white; }
  .meta-add-dash {
    padding: 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .meta-add-dash input {
    flex: 1;
    min-width: 150px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    font-size: 14px;
    color: white;
    outline: none;
  }
  .meta-add-dash input:focus { border-color: #667eea; background: rgba(255,255,255,0.12); }
  .card-adicionar {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(24px);
    border: 2px dashed rgba(255,255,255,0.2);
    border-radius: 20px;
    min-width: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
  }
  .card-adicionar:hover { background: rgba(255,255,255,0.1); transform: scale(1.02); }
  .card-adicionar-conteudo { text-align: center; padding: 40px 20px; color: white; }
  .card-adicionar-conteudo i { font-size: 48px; margin-bottom: 12px; opacity: 0.9; color: white; }
  
  .add-workspace-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 6px 12px;
    border-radius: 20px;
    color: white;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 16px;
  }
  .add-workspace-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: scale(1.02);
  }
  .add-workspace-btn i {
    font-size: 12px;
  }
  
  .btn-glass {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    padding: 10px 20px;
    border-radius: 40px;
    color: white;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
    box-shadow: 0 4px 16px rgba(102,126,234,0.3);
    height: 44px;
    font-size: 14px;
  }
  .btn-glass:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(102,126,234,0.4); }
  .adicionar {
    background: rgba(26, 27, 38, 0.6);
    backdrop-filter: blur(24px);
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 24px;
    border: 1px solid rgba(255, 255, 255, 0.08);
  }
  .adicionar h3 { color: white; margin-bottom: 20px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 12px; }
  .adicionar input, .adicionar select {
    padding: 12px 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    font-size: 14px;
    color: white;
    outline: none;
    height: 44px;
  }
  .adicionar input:focus, .adicionar select:focus { border-color: #667eea; background: rgba(255,255,255,0.12); }
  .adicionar option { background: #1a1b26; color: white; }
  .filtros { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
  .filtro-btn {
    padding: 8px 20px;
    background: rgba(26,27,38,0.6);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 40px;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
    font-size: 14px;
    height: 40px;
  }
  .filtro-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: rgba(255,255,255,0.2); }
  .filtro-btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.15); }
  .estatisticas {
    background: rgba(26,27,38,0.6);
    backdrop-filter: blur(24px);
    border-radius: 24px;
    padding: 24px;
    margin-top: 24px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 20px; }
  .stat-card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    transition: all 0.3s;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .stat-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.08); }
  .stat-card i { font-size: 32px; margin-bottom: 12px; color: #667eea; }
  .stat-numero {
    font-size: 36px;
    font-weight: 800;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.8;
    margin-top: 6px;
    color: rgba(255,255,255,0.8);
  }
  .grafico-barras {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    height: 160px;
    margin-top: 24px;
    padding: 16px;
    background: rgba(255,255,255,0.03);
    border-radius: 16px;
  }
  .barra {
    flex: 1;
    background: linear-gradient(180deg, #667eea, #764ba2);
    border-radius: 12px 12px 0 0;
    position: relative;
    transition: height 0.3s;
    min-width: 40px;
  }
  .barra-valor { position: absolute; top: -24px; left: 50%; transform: translateX(-50%); font-size: 12px; font-weight: 600; color: white; }
  .barra-label { position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%); font-size: 11px; white-space: nowrap; color: rgba(255,255,255,0.7); }
  .backup-acoes { display: flex; gap: 12px; justify-content: center; margin-top: 32px; }
  .empty-state { text-align: center; padding: 40px 20px; opacity: 0.6; color: white; }
  .empty-state i { font-size: 48px; margin-bottom: 12px; }

  .foco-ativo .notificacao-silenciada { display: none; }
  .foco-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.3);
    pointer-events: none;
    z-index: 999;
    border: 3px solid rgba(102,126,234,0.5);
    box-shadow: inset 0 0 50px rgba(102,126,234,0.2);
  }
  .modal-foco-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    z-index: 2000;
    align-items: center;
    justify-content: center;
  }
  .modal-foco-overlay.show { display: flex; }
  .modal-foco-conteudo {
    background: rgba(26,27,38,0.95);
    backdrop-filter: blur(24px);
    padding: 40px;
    border-radius: 32px;
    max-width: 600px;
    width: 90%;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .progresso-foco { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin: 20px 0; overflow: hidden; }
  .progresso-foco-bar { height: 100%; background: linear-gradient(135deg, #667eea, #764ba2); width: 0%; transition: width 0.3s; }
  .calendario-grade { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .calendario-dia-semana { text-align: center; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 12px; color: white; }
  .calendario-dia { min-height: 100px; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 8px; cursor: pointer; transition: all 0.2s; color: white; }
  .calendario-dia.hoje { border: 1px solid #667eea; }
  @media (max-width: 768px) {
    body { padding: 16px; }
    .user-info { position: static; justify-content: center; margin-top: 16px; }
    .logo-titulo { font-size: 24px; }
    .top-bar { flex-direction: column; align-items: stretch; }
    .view-toggle { justify-content: center; }
    .busca-global { width: 100%; }
    .form-grid { grid-template-columns: 1fr 1fr; }
    .meta-card, .bloco-tarefa { min-width: 100%; }
  }
  [data-theme="dark"] body { background: linear-gradient(135deg, #1a1b2e, #2d1b3e); }
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-container">
    <div class="logo-img" style="margin: 0 auto 20px;">
      <img src="logo.png" alt="Fluxo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'45\' fill=\'white\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'%23667eea\' font-size=\'40\' font-weight=\'bold\'%3EF%3C/text%3E%3C/svg%3E'">
    </div>
    <h2>FLUXO</h2>
    <p style="color: rgba(255,255,255,0.7); margin-bottom: 30px;">Organize. Execute. Flua.</p>
    <div id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email" autocomplete="off">
      <div class="password-container">
        <input type="password" id="loginPassword" placeholder="Senha">
        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('loginPassword', this)">
          <i class="far fa-eye"></i>
        </button>
      </div>
      <div id="loginErrorMessage" class="error-message"></div>
      <button class="login-btn" onclick="fazerLogin()">Entrar</button>
      <a class="register-link" onclick="mostrarCadastro()">Não tem uma conta? Cadastre-se</a>
    </div>
    <div id="registerForm" style="display: none;">
      <input type="email" id="registerEmail" placeholder="Email" autocomplete="off">
      <div class="password-container">
        <input type="password" id="registerPassword" placeholder="Senha">
        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('registerPassword', this)">
          <i class="far fa-eye"></i>
        </button>
      </div>
      <div class="password-container">
        <input type="password" id="registerConfirm" placeholder="Confirmar Senha">
        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('registerConfirm', this)">
          <i class="far fa-eye"></i>
        </button>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";
  import { getFirestore, doc, getDoc, setDoc } from "firebase/firestore";

  const firebaseConfig = {
    apiKey: "AIzaSyDWUCRDmwf5_332izdNMCRsrjTG5z4Ho9g",
    authDomain: "fluxo-app-c71ec.firebaseapp.com",
    projectId: "fluxo-app-c71ec",
    storageBucket: "fluxo-app-c71ec.firebasestorage.app",
    messagingSenderId: "942507349330",
    appId: "1:942507349330:web:6ce004396cf55ec5ca568b",
    measurementId: "G-SVRN7MRG3L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;

  // Inicializar dados padrão se não existirem
  if (!localStorage.getItem('cardsTarefas') || JSON.parse(localStorage.getItem('cardsTarefas')).length === 0) {
    const defaultCards = [
      { id: "tarefa_pessoal_" + Date.now(), nome: "Pessoal" },
      { id: "tarefa_jw_" + Date.now(), nome: "JW" },
      { id: "tarefa_at_" + Date.now(), nome: "At Inovvate" },
      { id: "tarefa_waw_" + Date.now(), nome: "WAW" }
    ];
    localStorage.setItem('cardsTarefas', JSON.stringify(defaultCards));
    localStorage.setItem('cardsMetas', JSON.stringify(defaultCards.map(c => ({ ...c, id: c.id.replace('tarefa', 'meta') }))));
  }

  async function salvarTudoFirebase() {
    if (!currentUser) return;
    try {
      await setDoc(doc(db, "usuarios", currentUser.uid), {
        tarefas: JSON.parse(localStorage.getItem('tarefas') || '[]'),
        metas: JSON.parse(localStorage.getItem('metas') || '[]'),
        cardsMetas: JSON.parse(localStorage.getItem('cardsMetas') || '[]'),
        cardsTarefas: JSON.parse(localStorage.getItem('cardsTarefas') || '[]'),
        ultimaAtualizacao: new Date().toISOString()
      });
      console.log("✅ Firebase salvo");
    } catch (err) { console.error(err); }
  }
  window.salvarTudoFirebase = salvarTudoFirebase;

  async function carregarDadosFirebase() {
    if (!currentUser) return;
    try {
      const docRef = doc(db, "usuarios", currentUser.uid);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        const dados = docSnap.data();
        if (dados.tarefas) localStorage.setItem('tarefas', JSON.stringify(dados.tarefas));
        if (dados.metas) localStorage.setItem('metas', JSON.stringify(dados.metas));
        if (dados.cardsMetas && dados.cardsMetas.length > 0) localStorage.setItem('cardsMetas', JSON.stringify(dados.cardsMetas));
        if (dados.cardsTarefas && dados.cardsTarefas.length > 0) localStorage.setItem('cardsTarefas', JSON.stringify(dados.cardsTarefas));
        
        // Recarregar a página para atualizar os dados
        if (window.recarregarSistema) window.recarregarSistema();
      }
    } catch (err) { console.error(err); }
  }

  window.fazerLogin = async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch(e) { document.getElementById('loginErrorMessage').textContent = 'Email ou senha inválidos!'; }
  };
  
  window.fazerCadastro = async () => {
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;
    const confirm = document.getElementById('registerConfirm').value;
    if (password !== confirm) { document.getElementById('registerErrorMessage').textContent = 'Senhas não coincidem!'; return; }
    try {
      await createUserWithEmailAndPassword(auth, email, password);
      alert('✅ Conta criada!');
    } catch(e) { document.getElementById('registerErrorMessage').textContent = e.message; }
  };
  
  window.fazerLogout = () => signOut(auth);
  window.sincronizarFirebase = async () => { await salvarTudoFirebase(); alert('✅ Sincronizado!'); };
  window.mostrarCadastro = () => { document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'block'; };
  window.mostrarLogin = () => { document.getElementById('loginForm').style.display = 'block'; document.getElementById('registerForm').style.display = 'none'; };
  
  document.getElementById('logoutBtn').onclick = () => window.fazerLogout();
  document.getElementById('syncBtn').onclick = () => window.sincronizarFirebase();

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      document.getElementById('userName').textContent = user.email;
      await carregarDadosFirebase();
    } else {
      currentUser = null;
      document.getElementById('loginOverlay').style.display = 'flex';
      document.getElementById('mainApp').style.display = 'none';
    }
  });
  
  window.togglePasswordVisibility = function(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
      input.type = 'text';
      btn.innerHTML = '<i class="far fa-eye-slash"></i>';
    } else {
      input.type = 'password';
      btn.innerHTML = '<i class="far fa-eye"></i>';
    }
  };
</script>

<script>
  // ========== FUNÇÕES PRINCIPAIS ==========
  
  function carregarDados() {
    window.tarefas = JSON.parse(localStorage.getItem('tarefas') || '[]');
    window.metas = JSON.parse(localStorage.getItem('metas') || '[]');
    window.cardsMetas = JSON.parse(localStorage.getItem('cardsMetas') || '[]');
    window.cardsTarefas = JSON.parse(localStorage.getItem('cardsTarefas') || '[]');
    
    // Garantir que tenha pelo menos um card
    if(window.cardsTarefas.length === 0) {
      window.cardsTarefas = [{ id: "default_" + Date.now(), nome: "Minhas Tarefas" }];
      localStorage.setItem('cardsTarefas', JSON.stringify(window.cardsTarefas));
    }
    if(window.cardsMetas.length === 0) {
      window.cardsMetas = [{ id: "default_meta_" + Date.now(), nome: "Minhas Metas" }];
      localStorage.setItem('cardsMetas', JSON.stringify(window.cardsMetas));
    }
  }
  
  function salvarCardsTarefas() {
    localStorage.setItem('cardsTarefas', JSON.stringify(window.cardsTarefas));
    atualizarSelectCategorias();
    renderizarTarefas();
    if(window.salvarTudoFirebase) window.salvarTudoFirebase();
  }
  
  function salvarTarefas() {
    localStorage.setItem('tarefas', JSON.stringify(window.tarefas));
    renderizarTarefas();
    renderizarEstatisticas();
    if(window.salvarTudoFirebase) window.salvarTudoFirebase();
  }
  
  function salvarMetas() {
    localStorage.setItem('metas', JSON.stringify(window.metas));
    renderizarDashboardMetas();
    renderizarEstatisticas();
    if(window.salvarTudoFirebase) window.salvarTudoFirebase();
  }
  
  function salvarCardsMetas() {
    localStorage.setItem('cardsMetas', JSON.stringify(window.cardsMetas));
    renderizarDashboardMetas();
    if(window.salvarTudoFirebase) window.salvarTudoFirebase();
  }
  
  function adicionarCardTarefa() {
    const nome = prompt('📋 Nome do novo espaço de trabalho:');
    if(nome && nome.trim()) {
      const novoCard = { 
        id: 'tarefa_' + Date.now() + '_' + Math.random(), 
        nome: nome.trim() 
      };
      window.cardsTarefas.push(novoCard);
      salvarCardsTarefas();
      alert(`✅ Espaço "${nome}" criado com sucesso!`);
      console.log('Cards após adicionar:', window.cardsTarefas);
    } else {
      alert('Por favor, digite um nome para o espaço de trabalho!');
    }
  }
  
  function adicionarCardMeta() {
    const nome = prompt('🏆 Nome do novo espaço de trabalho (Metas):');
    if(nome && nome.trim()) {
      const novoCard = { 
        id: 'meta_' + Date.now() + '_' + Math.random(), 
        nome: nome.trim() 
      };
      window.cardsMetas.push(novoCard);
      salvarCardsMetas();
      alert(`✅ Espaço "${nome}" criado com sucesso!`);
    }
  }
  
  function atualizarSelectCategorias() {
    const select = document.getElementById('nova-bloco');
    if(!select) return;
    select.innerHTML = '';
    window.cardsTarefas.forEach(card => {
      const option = document.createElement('option');
      option.value = card.nome;
      option.textContent = card.nome;
      select.appendChild(option);
    });
  }
  
  function renderizarTarefas() {
    const container = document.getElementById('blocosTarefas');
    if(!container) return;
    container.innerHTML = '';
    
    const hoje = new Date().toISOString().split('T')[0];
    const cards = window.cardsTarefas || [];
    
    if(cards.length === 0) {
      container.innerHTML = `
        <div class="bloco-tarefa" style="min-width: 100%; text-align: center; padding: 40px;">
          <div class="empty-state">
            <i class="fas fa-folder-open"></i>
            <p>Nenhum espaço de trabalho</p>
            <small>Clique em "Novo Espaço de Trabalho" para começar</small>
          </div>
        </div>
      `;
      return;
    }
    
    cards.forEach(card => {
      const tarefasDoCard = window.tarefas.filter(t => t.bloco === card.nome);
      const tarefasFiltradas = filtrarTarefas(tarefasDoCard);
      const ativas = tarefasFiltradas.filter(t => !t.concluida).length;
      
      const div = document.createElement('div');
      div.className = 'bloco-tarefa';
      div.innerHTML = `
        <div class="bloco-header">
          <span><i class="fas fa-list-ul"></i> ${escapeHtml(card.nome)}</span>
          <div class="card-actions">
            <span>${ativas} ativas</span>
            <button onclick="editarCardTarefa('${card.id}')"><i class="fas fa-edit"></i></button>
            <button onclick="excluirCardTarefa('${card.id}')"><i class="fas fa-trash-alt"></i></button>
          </div>
        </div>
        <div class="tarefa-lista" id="tarefa-lista-${card.id}">
          ${renderizarListaTarefas(tarefasFiltradas, hoje)}
        </div>
      `;
      container.appendChild(div);
    });
    
    // Botão para adicionar novo espaço
    const addCard = document.createElement('div');
    addCard.className = 'bloco-tarefa card-adicionar';
    addCard.onclick = () => adicionarCardTarefa();
    addCard.innerHTML = `
      <div class="card-adicionar-conteudo">
        <i class="fas fa-plus-circle"></i>
        <p>Novo Espaço</p>
      </div>
    `;
    container.appendChild(addCard);
  }
  
  function renderizarListaTarefas(tarefasList, hoje) {
    if(tarefasList.length === 0) {
      return `<div class="empty-state"><i class="fas fa-check-circle"></i><p>Tudo certo por aqui</p><small>Adicione uma tarefa para começar</small></div>`;
    }
    
    let html = '';
    tarefasList.forEach(t => {
      const atrasada = t.data && t.data < hoje && !t.concluida;
      const rec = {diaria:'🔄 Diária', dias_uteis:'📅 Dias úteis', semanal:'📆 Semanal', mensal:'📅 Mensal'}[t.recorrencia] || '';
      html += `
        <div class="tarefa-item ${t.concluida ? 'concluida' : ''}">
          <input type="checkbox" ${t.concluida ? 'checked' : ''} onchange="toggleTarefa(${t.id})">
          <div class="tarefa-conteudo">
            <div class="tarefa-texto">${escapeHtml(t.texto)}</div>
            <div class="tarefa-meta">
              ${t.data ? `<span class="badge ${atrasada ? 'atrasada' : ''}">${atrasada ? '<i class="fas fa-triangle-exclamation"></i> ' : '<i class="fas fa-calendar"></i> '}${t.data}</span>` : ''}
              ${t.prioridade === 'p1' ? '<span class="badge p1"><i class="fas fa-flag"></i> Alta</span>' : ''}
              ${rec ? `<span class="badge recorrente">${rec}</span>` : ''}
            </div>
          </div>
          <div class="item-actions">
            <button onclick="abrirModoFocoComTarefa(${t.id})" title="Pomodoro"><i class="fas fa-clock"></i></button>
            <button onclick="editarTarefa(${t.id})"><i class="fas fa-edit"></i></button>
            <button onclick="excluirTarefa(${t.id})"><i class="fas fa-trash-alt"></i></button>
          </div>
        </div>
      `;
    });
    return html;
  }
  
  function filtrarTarefas(lista) {
    const termo = document.getElementById('buscaGlobal')?.value.toLowerCase() || '';
    let filtradas = lista;
    if(termo) filtradas = filtradas.filter(t => t.texto.toLowerCase().includes(termo));
    
    if(filtroAtual === 'hoje') {
      const hoje = new Date().toISOString().split('T')[0];
      return filtradas.filter(t => t.data <= hoje && !t.concluida);
    }
    if(filtroAtual === 'concluidas') return filtradas.filter(t => t.concluida);
    return filtradas.filter(t => !t.concluida);
  }
  
  function renderizarDashboardMetas() {
    const container = document.getElementById('dashboardMetasGrid');
    if(!container) return;
    container.innerHTML = '';
    
    const cards = window.cardsMetas || [];
    
    cards.forEach(card => {
      const metasDoCard = window.metas.filter(m => m.categoria === card.nome);
      const total = metasDoCard.length;
      const atingidas = metasDoCard.filter(m => m.atingida).length;
      const percentual = total > 0 ? Math.round((atingidas / total) * 100) : 0;
      
      const div = document.createElement('div');
      div.className = 'meta-card';
      div.innerHTML = `
        <div class="meta-card-header">
          <span><i class="fas fa-tag"></i> ${escapeHtml(card.nome)}</span>
          <div class="card-actions">
            <span class="meta-progresso">${atingidas}/${total}</span>
            <button onclick="editarCardMeta('${card.id}')"><i class="fas fa-edit"></i></button>
            <button onclick="excluirCardMeta('${card.id}')"><i class="fas fa-trash-alt"></i></button>
          </div>
        </div>
        <div class="meta-progresso-bar"><div class="meta-progresso-fill" style="width:${percentual}%"></div></div>
        <div class="meta-lista" id="meta-lista-${card.id}">
          ${renderizarListaMetas(metasDoCard)}
        </div>
        <div class="meta-add-dash">
          <input type="text" id="input-meta-${card.id}" placeholder="Nova meta...">
          <input type="date" id="input-data-meta-${card.id}">
          <button class="btn-glass" onclick="adicionarMeta('${card.nome}','${card.id}')"><i class="fas fa-plus"></i> Adicionar</button>
        </div>
      `;
      container.appendChild(div);
    });
    
    const addCard = document.createElement('div');
    addCard.className = 'meta-card card-adicionar';
    addCard.onclick = () => adicionarCardMeta();
    addCard.innerHTML = `<div class="card-adicionar-conteudo"><i class="fas fa-plus-circle"></i><p>Novo Espaço</p></div>`;
    container.appendChild(addCard);
  }
  
  function renderizarListaMetas(metasList) {
    if(metasList.length === 0) {
      return `<div class="empty-state"><i class="fas fa-bullseye"></i><p>Tudo em dia por aqui</p><small>Adicione uma meta para começar</small></div>`;
    }
    
    let html = '';
    metasList.forEach(meta => {
      html += `
        <div class="meta-item-dash ${meta.atingida ? 'atingida' : ''}">
          <input type="checkbox" ${meta.atingida ? 'checked' : ''} onchange="toggleMeta(${meta.id})">
          <div style="flex:1">
            <div class="meta-texto-dash">${escapeHtml(meta.texto)}</div>
            ${meta.dataLimite ? `<div class="meta-data-limite"><i class="fas fa-calendar-alt"></i> ${new Date(meta.dataLimite).toLocaleDateString('pt-BR')}</div>` : ''}
          </div>
          <div class="item-actions">
            <button onclick="editarMetaPrompt(${meta.id})"><i class="fas fa-edit"></i></button>
            <button onclick="excluirMeta(${meta.id})"><i class="fas fa-trash-alt"></i></button>
          </div>
        </div>
      `;
    });
    return html;
  }
  
  function renderizarEstatisticas() {
    const tt = window.tarefas.length;
    const concluidas = window.tarefas.filter(t => t.concluida).length;
    const metasAt = window.metas.filter(m => m.atingida).length;
    const tempo = window.tarefas.reduce((a, t) => a + (t.tempoGasto || 0), 0);
    const horas = Math.floor(tempo / 3600);
    const min = Math.floor((tempo % 3600) / 60);
    
    const statsGrid = document.getElementById('statsGrid');
    if(statsGrid) {
      statsGrid.innerHTML = `
        <div class="stat-card"><i class="fas fa-check-circle"></i><div class="stat-numero">${concluidas}</div><div class="stat-label">Tarefas Concluídas</div></div>
        <div class="stat-card"><i class="fas fa-chart-simple"></i><div class="stat-numero">${tt ? Math.round(concluidas / tt * 100) : 0}%</div><div class="stat-label">Taxa de Conclusão</div></div>
        <div class="stat-card"><i class="fas fa-trophy"></i><div class="stat-numero">${metasAt}/${window.metas.length}</div><div class="stat-label">Metas Atingidas</div></div>
        <div class="stat-card"><i class="fas fa-hourglass-half"></i><div class="stat-numero">${horas}h ${min}m</div><div class="stat-label">Tempo Focado</div></div>
      `;
    }
  }
  
  // Funções auxiliares
  function escapeHtml(text) {
    if(!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
  
  function toggleTarefa(id) {
    const tarefa = window.tarefas.find(t => t.id === id);
    if(tarefa) {
      tarefa.concluida = !tarefa.concluida;
      salvarTarefas();
    }
  }
  
  function toggleMeta(id) {
    const meta = window.metas.find(m => m.id === id);
    if(meta) {
      meta.atingida = !meta.atingida;
      salvarMetas();
    }
  }
  
  function excluirTarefa(id) {
    if(confirm('Excluir tarefa?')) {
      window.tarefas = window.tarefas.filter(t => t.id !== id);
      salvarTarefas();
    }
  }
  
  function excluirMeta(id) {
    if(confirm('Excluir meta?')) {
      window.metas = window.metas.filter(m => m.id !== id);
      salvarMetas();
    }
  }
  
  function editarTarefa(id) {
    const tarefa = window.tarefas.find(t => t.id === id);
    if(!tarefa) return;
    const novoTexto = prompt('Editar tarefa:', tarefa.texto);
    if(novoTexto && novoTexto.trim()) tarefa.texto = novoTexto.trim();
    salvarTarefas();
  }
  
  function editarMetaPrompt(id) {
    const meta = window.metas.find(m => m.id === id);
    if(!meta) return;
    const novoTexto = prompt('Editar meta:', meta.texto);
    if(novoTexto && novoTexto.trim()) meta.texto = novoTexto.trim();
    salvarMetas();
  }
  
  function adicionarMeta(categoria, cardId) {
    const input = document.getElementById(`input-meta-${cardId}`);
    const texto = input?.value.trim();
    if(!texto) return;
    
    const dataInput = document.getElementById(`input-data-meta-${cardId}`);
    window.metas.push({
      id: Date.now(),
      texto: texto,
      categoria: categoria,
      atingida: false,
      dataLimite: dataInput?.value || ''
    });
    input.value = '';
    if(dataInput) dataInput.value = '';
    salvarMetas();
  }
  
  function adicionarTarefa() {
    const texto = document.getElementById('nova-tarefa').value.trim();
    if(!texto) {
      alert('Digite uma tarefa!');
      return;
    }
    const data = document.getElementById('nova-data').value || new Date().toISOString().split('T')[0];
    const bloco = document.getElementById('nova-bloco').value;
    window.tarefas.push({
      id: Date.now(),
      texto: texto,
      bloco: bloco,
      data: data,
      hora: document.getElementById('nova-hora').value,
      prioridade: document.getElementById('nova-prioridade').value,
      recorrencia: document.getElementById('nova-recorrencia').value,
      concluida: false,
      criada: new Date().toISOString(),
      alertado: false,
      tempoGasto: 0
    });
    document.getElementById('nova-tarefa').value = '';
    document.getElementById('nova-hora').value = '';
    salvarTarefas();
    alert('✅ Tarefa adicionada!');
  }
  
  function editarCardTarefa(id) {
    const card = window.cardsTarefas.find(c => c.id === id);
    if(!card) return;
    const novoNome = prompt('Editar nome do espaço:', card.nome);
    if(novoNome && novoNome.trim()) {
      // Atualizar nome em todas as tarefas
      window.tarefas.forEach(t => {
        if(t.bloco === card.nome) t.bloco = novoNome.trim();
      });
      card.nome = novoNome.trim();
      salvarCardsTarefas();
      salvarTarefas();
    }
  }
  
  function excluirCardTarefa(id) {
    const card = window.cardsTarefas.find(c => c.id === id);
    if(!card) return;
    if(confirm(`Excluir "${card.nome}"? As tarefas serão movidas para "Pessoal".`)) {
      const pessoal = window.cardsTarefas.find(c => c.nome === 'Pessoal') || window.cardsTarefas[0];
      window.tarefas.forEach(t => {
        if(t.bloco === card.nome) t.bloco = pessoal.nome;
      });
      window.cardsTarefas = window.cardsTarefas.filter(c => c.id !== id);
      salvarCardsTarefas();
      salvarTarefas();
    }
  }
  
  function editarCardMeta(id) {
    const card = window.cardsMetas.find(c => c.id === id);
    if(!card) return;
    const novoNome = prompt('Editar nome do espaço:', card.nome);
    if(novoNome && novoNome.trim()) {
      window.metas.forEach(m => {
        if(m.categoria === card.nome) m.categoria = novoNome.trim();
      });
      card.nome = novoNome.trim();
      salvarCardsMetas();
      salvarMetas();
    }
  }
  
  function excluirCardMeta(id) {
    const card = window.cardsMetas.find(c => c.id === id);
    if(!card) return;
    if(confirm(`Excluir "${card.nome}"? As metas serão movidas para "Pessoal".`)) {
      const pessoal = window.cardsMetas.find(c => c.nome === 'Pessoal') || window.cardsMetas[0];
      window.metas.forEach(m => {
        if(m.categoria === card.nome) m.categoria = pessoal.nome;
      });
      window.cardsMetas = window.cardsMetas.filter(c => c.id !== id);
      salvarCardsMetas();
      salvarMetas();
    }
  }
  
  function abrirModalNovaMeta() {
    const cat = prompt('Categoria:', window.cardsMetas[0]?.nome);
    if(cat && window.cardsMetas.some(c => c.nome === cat)) {
      const texto = prompt('Meta:');
      if(texto && texto.trim()) {
        window.metas.push({
          id: Date.now(),
          texto: texto.trim(),
          categoria: cat,
          atingida: false,
          dataLimite: ''
        });
        salvarMetas();
        alert('✅ Meta adicionada!');
      }
    }
  }
  
  function limparMetasConcluidas() {
    if(confirm('Remover metas concluídas?')) {
      window.metas = window.metas.filter(m => !m.atingida);
      salvarMetas();
      alert('✅ Metas concluídas removidas!');
    }
  }
  
  function abrirModoFocoComTarefa(id) {
    alert('Modo foco em desenvolvimento...');
  }
  
  let filtroAtual = 'hoje';
  function setFiltro(filtro, btn) {
    filtroAtual = filtro;
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderizarTarefas();
  }
  
  function buscarGlobal() {
    renderizarTarefas();
  }
  
  function toggleView(view) {
    const cardsView = document.getElementById('cardsView');
    const calendarioView = document.getElementById('calendarioView');
    const btns = document.querySelectorAll('.view-btn');
    
    if(view === 'cards') {
      cardsView.style.display = 'block';
      calendarioView.style.display = 'none';
      btns[0].classList.add('active');
      btns[1].classList.remove('active');
      renderizarTarefas();
    } else {
      cardsView.style.display = 'none';
      calendarioView.style.display = 'block';
      btns[0].classList.remove('active');
      btns[1].classList.add('active');
    }
  }
  
  function mudarMes(delta) {
    // Implementação do calendário
  }
  
  function exportarBackup() {
    const dados = {
      tarefas: window.tarefas,
      metas: window.metas,
      cardsMetas: window.cardsMetas,
      cardsTarefas: window.cardsTarefas
    };
    const blob = new Blob([JSON.stringify(dados)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `fluxo-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    alert('✅ Backup exportado!');
  }
  
  function importarBackup(event) {
    const file = event.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const dados = JSON.parse(e.target.result);
        if(confirm(`Importar backup?`)) {
          if(dados.tarefas) window.tarefas = dados.tarefas;
          if(dados.metas) window.metas = dados.metas;
          if(dados.cardsMetas) window.cardsMetas = dados.cardsMetas;
          if(dados.cardsTarefas) window.cardsTarefas = dados.cardsTarefas;
          salvarCardsMetas();
          salvarCardsTarefas();
          salvarTarefas();
          salvarMetas();
          alert('✅ Backup importado!');
        }
      } catch(err) {
        alert('❌ Erro ao importar.');
      }
    };
    reader.readAsText(file);
    event.target.value = '';
  }
  
  function atualizarDataHoje() {
    const hoje = new Date();
    document.getElementById('dataHoje').textContent = hoje.toLocaleDateString('pt-BR', {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
  }
  
  window.recarregarSistema = function() {
    carregarDados();
    atualizarSelectCategorias();
    renderizarDashboardMetas();
    renderizarTarefas();
    renderizarEstatisticas();
  };
  
  // Inicialização
  carregarDados();
  atualizarSelectCategorias();
  renderizarDashboardMetas();
  renderizarTarefas();
  renderizarEstatisticas();
  atualizarDataHoje();
  
  console.log('🚀 App inicializado com cards:', window.cardsTarefas);
</script>
