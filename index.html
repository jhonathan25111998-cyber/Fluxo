<!-- RESUMO DISCRETO DE METAS -->
<div class="metas-resumo" id="metasResumo">
  <div class="metas-resumo-left">
    <i class="fas fa-bullseye"></i>
    <span><strong id="totalMetas">0</strong> metas</span>
    <span>•</span>
    <span><strong id="concluidasMetas">0</strong> concluídas</span>
    <span>•</span>
    <span><strong id="progressoMetas">0</strong>%</span>
  </div>
  <button class="metas-toggle-btn" onclick="togglePainelMetas()">
    Ver metas
  </button>
</div>

<div class="metas-dashboard" id="metasCompletas" style="display:none;">
  <div class="metas-header">
    <h2><i class="fas fa-trophy"></i> Minhas Metas</h2>
  </div>
  <div class="metas-grid" id="metasGrid"></div>
  <div class="add-meta-form">
    <input type="text" id="novaMetaTexto" placeholder="Nova meta...">
    <select id="novaMetaCategoria">
      <option>Saúde</option><option>Desenvolvimento</option><option>Financeiro</option>
      <option>Espiritual</option><option>Carreira</option><option>Relacionamentos</option>
    </select>
    <button onclick="adicionarMeta()"><i class="fas fa-plus"></i> Adicionar</button>
  </div>
</div>
