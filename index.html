<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluxo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="mainApp" class="container">
    <header class="header-fluxo">
      <div class="header-logo">
        <div class="logo-fallback">📌</div>
        <div class="logo-texto">
          <div class="logo-titulo">Fluxo</div>
          <div class="logo-subtitulo">ORGANIZAÇÃO INTELIGENTE</div>
        </div>
      </div>

      <div class="header-direita">
        <span class="data-hoje" id="dataHoje"></span>
      </div>
    </header>

    <section class="top-section">
      <div class="view-toggle">
        <button id="btnCards" class="view-btn active" type="button">Cards</button>
        <button id="btnCalendario" class="view-btn" type="button">Calendário</button>
      </div>

      <div class="botoes-topo">
        <button id="btnNovaTarefaGlobal" class="top-action-btn" type="button">+ Nova tarefa</button>
      </div>
    </section>

    <!-- CARDS -->
    <section id="cardsView" class="view-section active">
      <div class="blocos-tarefas">
        <!-- Card Trabalho -->
        <article class="card-espaco" data-espaco="trabalho">
          <div class="card-header">
            <span>Trabalho</span>
            <button type="button" class="btn-add-inline" data-target="form-trabalho">+</button>
          </div>

          <div class="card-content">
            <div class="inline-form" id="form-trabalho">
              <input type="text" id="titulo-trabalho" placeholder="Título da tarefa" />
              <input type="date" id="data-trabalho" />
              <select id="prioridade-trabalho">
                <option value="p3">Baixa</option>
                <option value="p2">Média</option>
                <option value="p1">Urgente</option>
              </select>
              <div class="inline-form-buttons">
                <button class="btn-confirm" type="button" data-save="trabalho">Salvar</button>
                <button class="btn-cancel" type="button" data-cancel="form-trabalho">Cancelar</button>
              </div>
            </div>

            <div class="lista-tarefas" id="lista-trabalho"></div>
          </div>
        </article>

        <!-- Card Pessoal -->
        <article class="card-espaco" data-espaco="pessoal">
          <div class="card-header">
            <span>Pessoal</span>
            <button type="button" class="btn-add-inline" data-target="form-pessoal">+</button>
          </div>

          <div class="card-content">
            <div class="inline-form" id="form-pessoal">
              <input type="text" id="titulo-pessoal" placeholder="Título da tarefa" />
              <input type="date" id="data-pessoal" />
              <select id="prioridade-pessoal">
                <option value="p3">Baixa</option>
                <option value="p2">Média</option>
                <option value="p1">Urgente</option>
              </select>
              <div class="inline-form-buttons">
                <button class="btn-confirm" type="button" data-save="pessoal">Salvar</button>
                <button class="btn-cancel" type="button" data-cancel="form-pessoal">Cancelar</button>
              </div>
            </div>

            <div class="lista-tarefas" id="lista-pessoal"></div>
          </div>
        </article>
      </div>
    </section>

    <!-- CALENDÁRIO -->
    <section id="calendarioView" class="view-section">
      <div class="calendario-nav">
        <button id="btnMesAnterior" class="top-action-btn" type="button">◀ Anterior</button>
        <strong id="mesAnoLabel">Mês Ano</strong>
        <button id="btnMesProximo" class="top-action-btn" type="button">Próximo ▶</button>
        <button id="btnHoje" class="top-action-btn" type="button">Hoje</button>
      </div>

      <div class="calendario-grade" id="calendarioGrade"></div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
