  function getDataHoje() { const agora = new Date(); const ano = agora.getFullYear(); const mes = String(agora.getMonth() + 1).padStart(2, '0'); const dia = String(agora.getDate()).padStart(2, '0'); return `${ano}-${mes}-${dia}`; }

<div><span>${ativas} ativas</span><button onclick="editarCardTarefa('${card.id}')"><i class="fas fa-edit"></i></button><button onclick="excluirCardTarefa('${card.id}')"><i class="fas fa-trash-alt"></i></button></div></div><div class="tarefa-lista">${lista.length === 0 ? '<div class="empty-state" style="text-align:center;padding:40px 20px;color:rgba(255,255,255,0.6);"><i class="fas fa-check-circle" style="font-size:36px;margin-bottom:8px;"></i><p>Tudo certo por aqui</p><small>Adicione uma tarefa</small></div>' : lista.sort((a,b)=>(a.ordem||0)-(b.ordem||0)).map(t=>`<div class="tarefa-item" draggable="true" ondragstart="iniciarDragTarefa(${t.id}, '${escapeHtml(card.nome).replace(/'/g, "\\'")}', event)" ondragend="document.querySelectorAll('.tarefa-item').forEach(el=>el.classList.remove('dragging'))" ondragover="permitirDropTarefa(event)" ondrop="soltarTarefa(event, '${escapeHtml(card.nome).replace(/'/g, "\\'")}', ${t.id})"><div class="drag-handle"><i class="fas fa-grip-vertical"></i></div><input type="checkbox" ${t.concluida?'checked':''} onchange="toggleTarefa(${t.id})"><div class="tarefa-conteudo"><div class="tarefa-texto">${escapeHtml(t.texto)}</div><div class="tarefa-meta">${t.data?`<span class="badge ${isAtrasada(t.data) ? 'atrasada' : ''}"><i class="fas fa-calendar"></i> ${t.data} ${isAtrasada(t.data) ? '⚠️ ATRASADA' : ''}</span>`:''}<span class="badge ${prioridadeLabel(t.prioridade).class}"><i class="fas fa-flag"></i> ${prioridadeLabel(t.prioridade).text}</span>${t.recorrencia?`<span class="badge recorrente"><i class="fas fa-redo-alt"></i> ${t.recorrencia}</span>`:''}${t.tempoGasto?`<span class="badge"><i class="fas fa-clock"></i> ${Math.floor(t.tempoGasto/60)}min</span>`:''}</div></div><div class="item-actions"><button onclick="abrirModalReagendar(${t.id})" title="Reagendar"><i class="fas fa-calendar-alt"></i></button><button onclick="abrirModoFocoComTarefa(${t.id})" title="Modo Foco"><i class="fas fa-clock"></i></button><button onclick="excluirTarefa(${t.id})" title="Excluir"><i class="fas fa-trash-alt"></i></button></div></div>`).join('')}<button class="add-tarefa-btn" onclick="mostrarFormAdicionar('${escapeHtml(card.nome)}')"><i class="fas fa-plus-circle"></i> Adicionar Tarefa</button><div class="inline-form" id="${formId}"><input type="text" id="texto-${escapeHtml(card.nome)}" placeholder="Descreva a tarefa..." maxlength="200"><input type="date" id="data-${escapeHtml(card.nome)}" placeholder="Data" value="${getDataHoje()}"><select id="prioridade-${escapeHtml(card.nome)}"><option value="p3">🟢 Baixa Prioridade</option><option value="p2">🟡 Média Prioridade</option><option value="p1">🔴 Alta Prioridade</option></select><select id="recorrencia-${escapeHtml(card.nome)}"><option value="">Sem recorrência</option><option value="diaria">🔄 Diária</option><option value="dias_uteis">📅 Dias úteis</option><option value="semanal">📆 Semanal</option><option value="mensal">📅 Mensal</option></select><div class="inline-form-buttons"><button class="btn-confirm" onclick="adicionarTarefaInline('${escapeHtml(card.nome)}')">Adicionar</button><button class="btn-cancel" onclick="document.getElementById('${formId}').classList.remove('show')">Cancelar</button></div></div></div>`; container.appendChild(div); }); const addCard = document.createElement('div'); addCard.className='bloco-tarefa'; addCard.style.display='flex'; addCard.style.alignItems='center'; addCard.style.justifyContent='center'; addCard.style.cursor='pointer'; addCard.onclick=()=>adicionarCardTarefa(); addCard.innerHTML='<div style="text-align:center;padding:40px;color:white;"><i class="fas fa-plus-circle" style="font-size:48px;margin-bottom:8px;"></i><p>Novo Espaço</p></div>'; container.appendChild(addCard); }
  function renderizarEstatisticas() { const hoje = getDataHoje(); const atrasadas = tarefas.filter(t => t.data && t.data < hoje && !t.concluida).length; const hojeTarefas = tarefas.filter(t => t.data === hoje && !t.concluida).length; const tarefasPendentes = atrasadas + hojeTarefas; const tarefasHojeLista = tarefas.filter(t => t.data === hoje); const concluidasHoje = tarefasHojeLista.filter(t => t.concluida).length; const totalHoje = tarefasHojeLista.length; const taxaSucessoHoje = totalHoje > 0 ? Math.round((concluidasHoje / totalHoje) * 100) : 0; const horasFoco = Math.floor(tempoTotalFocado / 3600); const minutosFoco = Math.floor((tempoTotalFocado % 3600) / 60); document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><i class="fas fa-check-circle" style="color:white; font-size:24px; margin-bottom:8px;"></i><div class="stat-numero" style="color:white; background:none; -webkit-text-fill-color:white; font-weight:800;">${concluidasHoje}</div><div class="stat-label" style="color:white;">Concluídas Hoje</div><div style="font-size:10px; color:rgba(255,255,255,0.7);">de ${totalHoje}</div></div><div class="stat-card"><i class="fas fa-chart-simple" style="color:white; font-size:24px; margin-bottom:8px;"></i><div class="stat-numero" style="color:white; background:none; -webkit-text-fill-color:white; font-weight:800;">${taxaSucessoHoje}%</div><div class="stat-label" style="color:white;">Taxa Hoje</div></div><div class="stat-card"><i class="fas fa-calendar-day" style="color:white; font-size:24px; margin-bottom:8px;"></i><div class="stat-numero" style="color:white; background:none; -webkit-text-fill-color:white; font-weight:800;">${tarefasPendentes}</div><div class="stat-label" style="color:white;">Pendentes</div><div style="font-size:10px; color:rgba(255,255,255,0.7);">${atrasadas} atrasadas + ${hojeTarefas} hoje</div></div><div class="stat-card"><i class="fas fa-hourglass-half" style="color:white; font-size:24px; margin-bottom:8px;"></i><div class="stat-numero" style="color:white; background:none; -webkit-text-fill-color:white; font-weight:800;">${horasFoco}h ${minutosFoco}m</div><div class="stat-label" style="color:white;">Tempo Focado</div></div>`; }
  function mudarMes(d) { dataCalendario.setMonth(dataCalendario.getMonth() + d); renderizarCalendario(); }
  function irParaHoje() { dataCalendario = new Date(); renderizarCalendario(); }
  function irParaData() { const dataInput = prompt('Digite a data (YYYY-MM-DD):', getDataHoje()); if(dataInput && dataInput.match(/^\d{4}-\d{2}-\d{2}$/)) { const [ano, mes, dia] = dataInput.split('-'); dataCalendario = new Date(parseInt(ano), parseInt(mes) - 1, parseInt(dia)); renderizarCalendario(); } else if(dataInput) { alert('Formato inválido! Use YYYY-MM-DD'); } }
  function concluirTarefaCalendario(id) { const tarefa = tarefas.find(t => t.id === id); if(tarefa && confirm(`Concluir "${tarefa.texto}"?`)) { tarefa.concluida = true; salvarDados(); renderizarCalendario(); mostrarIndicadorSync('✅ Tarefa concluída!'); } }
  function abrirEditarTarefaCalendario(id) { const tarefa = tarefas.find(t => t.id === id); if(!tarefa) return; const novoTexto = prompt('Editar texto:', tarefa.texto); if(novoTexto && novoTexto.trim()) tarefa.texto = novoTexto.trim(); const novaData = prompt('Editar data (YYYY-MM-DD):', tarefa.data); if(novaData && novaData.trim()) tarefa.data = novaData.trim(); const prioridadeAtual = tarefa.prioridade === 'p1' ? 'Alta' : (tarefa.prioridade === 'p2' ? 'Média' : 'Baixa'); const novaPrioridade = prompt(`Editar prioridade:\n1 - Alta 🔴\n2 - Média 🟡\n3 - Baixa 🟢\n\nAtual: ${prioridadeAtual}`, tarefa.prioridade === 'p1' ? '1' : (tarefa.prioridade === 'p2' ? '2' : '3')); if(novaPrioridade === '1') tarefa.prioridade = 'p1'; else if(novaPrioridade === '2') tarefa.prioridade = 'p2'; else if(novaPrioridade === '3') tarefa.prioridade = 'p3'; salvarDados(); renderizarCalendario(); mostrarIndicadorSync('✏️ Tarefa editada!'); }
  function adicionarTarefaCalendario(data) { const texto = prompt('📝 Digite a tarefa:'); if(!texto || !texto.trim()) return; const prioridade = prompt('Prioridade:\n1 - Alta 🔴\n2 - Média 🟡\n3 - Baixa 🟢', '3'); let prioridadeValue = 'p3'; if(prioridade === '1') prioridadeValue = 'p1'; else if(prioridade === '2') prioridadeValue = 'p2'; const cardNome = prompt('Qual espaço? (deixe em branco para "Minhas Tarefas")', 'Minhas Tarefas'); const cardDestino = cardNome && cardNome.trim() ? cardNome.trim() : 'Minhas Tarefas'; let cardExistente = cardsTarefas.find(c => c.nome === cardDestino); if(!cardExistente) { cardsTarefas.push({ id: 'card_' + Date.now(), nome: cardDestino }); cardExistente = cardsTarefas.find(c => c.nome === cardDestino); } tarefas.push({ id: Date.now(), texto: texto.trim(), bloco: cardDestino, data: data, prioridade: prioridadeValue, recorrencia: '', concluida: false, tempoGasto: 0, notificado: false, ordem: tarefas.filter(t => t.bloco === cardDestino && !t.concluida).length }); salvarDados(); renderizarCalendario(); mostrarIndicadorSync(`✅ Tarefa adicionada em ${data}!`); }
  function abrirOpcoesTarefaCalendario(id, texto, data) { const opcao = prompt(`📋 Tarefa: ${texto}\n📅 Data: ${data}\n\nO que deseja fazer?\n1 - Concluir tarefa\n2 - Editar tarefa\n3 - Reagendar tarefa\n4 - Excluir tarefa\n\nDigite o número da opção:`); if(opcao === '1') { concluirTarefaCalendario(id); } else if(opcao === '2') { abrirEditarTarefaCalendario(id); } else if(opcao === '3') { abrirModalReagendar(id); setTimeout(() => renderizarCalendario(), 100); } else if(opcao === '4') { if(confirm(`Excluir tarefa "${texto}"?`)) { excluirTarefa(id); renderizarCalendario(); } } }
  function renderizarCalendario() { const ano = dataCalendario.getFullYear(), mes = dataCalendario.getMonth(); const primeiroDia = new Date(ano, mes, 1).getDay(); const diasNoMes = new Date(ano, mes + 1, 0).getDate(); const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']; document.getElementById('calendarioMes').textContent = `${meses[mes]} ${ano}`; let html = '<div class="calendario-grade">'; const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb']; for(let i = 0; i < 7; i++) { html += `<div class="calendario-dia-semana">${diasSemana[i]}</div>`; } let dia = 1; const hoje = getDataHoje(); const hojeObj = new Date(); const mesAtual = hojeObj.getMonth(); const anoAtual = hojeObj.getFullYear(); for(let i = 0; i < 42; i++) { if(i < primeiroDia || dia > diasNoMes) { html += `<div class="calendario-dia" style="opacity:0.3;"></div>`; } else { const dataStr = `${ano}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`; const tarefasDia = tarefas.filter(t => t.data === dataStr && !t.concluida); const tarefasConcluidasDia = tarefas.filter(t => t.data === dataStr && t.concluida); const isHoje = (ano === anoAtual && mes === mesAtual && dia === hojeObj.getDate()); const prioridadeAlta = tarefasDia.filter(t => t.prioridade === 'p1').length; html += `<div class="calendario-dia ${isHoje ? 'hoje' : ''}" style="position:relative; ${prioridadeAlta > 0 ? 'border-left: 3px solid #FCA5A5;' : ''}"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;"><span style="font-weight:bold; font-size:14px;">${dia}</span><div style="display:flex; gap:4px;">${tarefasConcluidasDia.length > 0 ? `<span style="font-size:10px; background:#10b981; color:white; padding:2px 6px; border-radius:10px;">✓${tarefasConcluidasDia.length}</span>` : ''}</div></div><div class="calendario-tarefas" style="max-height:100px; overflow-y:auto; font-size:11px;">${tarefasDia.slice(0, 4).map(t => `<div class="calendario-tarefa-item" style="background:${t.prioridade === 'p1' ? 'rgba(239,68,68,0.2)' : 'rgba(102,126,234,0.2)'}; border-radius:6px; padding:4px 6px; margin-bottom:4px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;" onclick="abrirOpcoesTarefaCalendario(${t.id}, '${escapeHtml(t.texto).replace(/'/g, "\\'")}', '${t.data}')"><span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;">📌 ${escapeHtml(t.texto.substring(0,25))}${t.texto.length > 25 ? '...' : ''}</span><div style="display:flex; gap:3px;"><button class="calendario-btn-edit" onclick="event.stopPropagation(); abrirEditarTarefaCalendario(${t.id})" style="background:transparent; border:none; color:#667eea; cursor:pointer; font-size:10px;" title="Editar">✏️</button><button class="calendario-btn-check" onclick="event.stopPropagation(); concluirTarefaCalendario(${t.id})" style="background:transparent; border:none; color:#10b981; cursor:pointer; font-size:10px;" title="Concluir">✓</button></div></div>`).join('')}${tarefasDia.length > 4 ? `<div style="font-size:10px; color:#667eea; text-align:center; margin-top:4px;">+${tarefasDia.length - 4} mais</div>` : ''}</div><button onclick="adicionarTarefaCalendario('${dataStr}')" style="width:100%; margin-top:6px; padding:3px; background:rgba(102,126,234,0.3); border:none; border-radius:6px; color:white; cursor:pointer; font-size:10px;"><i class="fas fa-plus"></i> Adicionar</button></div>`; dia++; } } html += '</div>'; document.getElementById('calendarioGrade').innerHTML = html; }
  function toggleView(view) { document.getElementById('cardsView').style.display = view==='cards'?'block':'none'; document.getElementById('calendarioView').style.display = view==='calendario'?'block':'none'; document.querySelectorAll('.view-btn').forEach((btn,i)=>{ if((view==='cards' && i===0) || (view==='calendario' && i===1)) btn.classList.add('active'); else btn.classList.remove('active'); }); if(view==='calendario') renderizarCalendario(); else renderizarTarefas(); }
  function exportarBackup() { const dados = { tarefas, metas, cardsTarefas, tempoTotalFocado }; const blob = new Blob([JSON.stringify(dados)], {type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`fluxo-backup-${getDataHoje()}.json`; a.click(); alert('✅ Backup exportado!'); }
  function importarBackup(e) { const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=(ev)=>{ try{ const dados=JSON.parse(ev.target.result); if(dados.tarefas) tarefas=dados.tarefas; if(dados.metas) metas=dados.metas; if(dados.cardsTarefas) cardsTarefas=dados.cardsTarefas; if(dados.tempoTotalFocado) tempoTotalFocado=dados.tempoTotalFocado; salvarDados(); alert('✅ Backup importado!'); }catch(err){ alert('Erro ao importar arquivo'); } }; reader.readAsText(file); e.target.value = ''; }
  function recarregarSistema() { tarefas = JSON.parse(localStorage.getItem('tarefas')||'[]'); metas = JSON.parse(localStorage.getItem('metas')||'[]'); cardsTarefas = JSON.parse(localStorage.getItem('cardsTarefas')||'[]'); tempoTotalFocado = parseInt(localStorage.getItem('tempoTotalFocado')||'0'); if(cardsTarefas.length===0) cardsTarefas=[{id:"default",nome:"Minhas Tarefas"}]; verificarResetDiario(); renderizarTarefas(); renderizarMetas(); renderizarEstatisticas(); renderizarCalendario(); document.getElementById('dataHoje').textContent = new Date().toLocaleDateString('pt-BR', { weekday:'long', year:'numeric', month:'long', day:'numeric' }); }
  window.recarregarSistema = recarregarSistema;
  window.iniciarSincronizacaoPeriodica = iniciarSincronizacaoPeriodica;
  window.iniciarDragTarefa = iniciarDragTarefa;
  window.permitirDropTarefa = permitirDropTarefa;
  window.permitirDropCard = permitirDropCard;
  window.removerDragOver = removerDragOver;
  window.soltarTarefa = soltarTarefa;
  window.concluirTodasAtrasadas = concluirTodasAtrasadas;
  window.excluirCardTarefa = excluirCardTarefa;
  window.excluirTarefa = excluirTarefa;
  window.mudarMes = mudarMes;
  window.irParaHoje = irParaHoje;
  window.irParaData = irParaData;
  window.abrirOpcoesTarefaCalendario = abrirOpcoesTarefaCalendario;
  window.abrirEditarTarefaCalendario = abrirEditarTarefaCalendario;
  window.concluirTarefaCalendario = concluirTarefaCalendario;
  window.adicionarTarefaCalendario = adicionarTarefaCalendario;
  document.getElementById('themeToggle').addEventListener('click',()=>{ document.body.classList.toggle('dark-theme'); localStorage.setItem('theme',document.body.classList.contains('dark-theme')?'dark':'light'); });
  if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark-theme');
  const avatar = document.getElementById('userAvatar'); const tooltip = document.getElementById('userTooltip');
  if(avatar && tooltip) { avatar.addEventListener('mouseenter', () => { tooltip.style.display = 'block'; }); avatar.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; }); avatar.addEventListener('click', (e) => { e.stopPropagation(); tooltip.style.display = tooltip.style.display === 'block' ? 'none' : 'block'; setTimeout(() => { tooltip.style.display = 'none'; }, 3000); }); document.addEventListener('click', (e) => { if(!avatar.contains(e.target)) tooltip.style.display = 'none'; }); }
  function updateConnectionStatus() { const statusDiv = document.getElementById('statusConnection'); if (navigator.onLine) { statusDiv.innerHTML = '<i class="fas fa-wifi"></i> Online'; statusDiv.classList.remove('status-offline'); } else { statusDiv.innerHTML = '<i class="fas fa-plug"></i> Offline'; statusDiv.classList.add('status-offline'); } }
  window.addEventListener('online', updateConnectionStatus); window.addEventListener('offline', updateConnectionStatus); updateConnectionStatus();
  if ('Notification' in window && Notification.permission === 'granted') { setInterval(() => { const hoje = getDataHoje(); const agora = new Date(); const horaAtual = agora.getHours().toString().padStart(2,'0') + ':' + agora.getMinutes().toString().padStart(2,'0'); tarefas.forEach(t => { if (!t.concluida && t.data === hoje && t.hora === horaAtual && !t.notificado) { new Notification('⏰ Hora da tarefa!', { body: t.texto, icon: '🎯' }); t.notificado = true; salvarDados(); } }); }, 60000); }
  window.abrirModoFocoComTarefa = abrirModoFocoComTarefa; window.iniciarPomodoro = iniciarPomodoro; window.pausarPomodoro = pausarPomodoro; window.concluirTarefaFoco = concluirTarefaFoco; window.fecharModoFoco = fecharModoFoco; window.toggleMusicaFoco = toggleMusicaFoco; window.ajustarVolumeFoco = ajustarVolumeFoco; window.prorrogarTempoFoco = prorrogarTempoFoco; window.adicionarMeta = adicionarMeta; window.toggleTarefa = toggleTarefa; window.setFiltro = setFiltro; window.filtrarPorPrioridade = filtrarPorPrioridade; window.adicionarCardTarefa = adicionarCardTarefa; window.editarCardTarefa = editarCardTarefa; window.mostrarFormAdicionar = mostrarFormAdicionar; window.adicionarTarefaInline = adicionarTarefaInline; window.marcarTodasHoje = marcarTodasHoje; window.toggleView = toggleView; window.exportarBackup = exportarBackup; window.importarBackup = importarBackup; window.abrirModalReagendar = abrirModalReagendar; window.fecharModalReagendar = fecharModalReagendar; window.confirmarReagendamento = confirmarReagendamento; window.limparTodasDuplicatas = limparTodasDuplicatas;
  recarregarSistema(); initLofiAudio(); setInterval(()=>{ verificarResetDiario(); }, 60000);
</script>
